<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipment Deck — Reconciliation</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SHIPMENT DECK — v5 stylesheet
   Serious money software · deep near-black · neutral chrome
   COMPACT / dense pass — tight, consistent with the sidebar
   ============================================================ */
:root{
  --bg:#070809; --surface:#0f1013; --raise:#15181c; --hover:#1c1f25; --input:#111316;
  --line:#23262d; --line2:#353a44; --border:#23262d; --sidebar:#0f1013;
  --text:#f9fcff; --text2:#d8e1ec; --text3:#bcc6d4; --text4:#a9b4c3;
  --pri:#eef2f8; --pri-ink:#0a0d12; --pri-hi:#ffffff;
  --amber:#f7a827; --blue:#4d94ff; --green:#2fd39a; --red:#ff5a67; --violet:#ab86ff; --grey:#8a97a7;
  --focus:#5686c8; --ring:rgba(86,134,200,.26);
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 22px rgba(0,0,0,.34);
  --shadow-lg:0 28px 70px rgba(0,0,0,.68);
  /* scale — tightened */
  --h-header:60px; --w-side:170px;
  --px:14px; --py:9px; --gap:4px; --gap2:7px; --gap3:9px;
  --ctrl:27px; --row:36px; --radius:7px; --radius-sm:6px; --radius-lg:11px;
  --sans:'Plus Jakarta Sans','Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace;
}
[data-theme="light"]{
  --bg:#eef1f5; --surface:#ffffff; --raise:#f6f7f9; --hover:#eef2f7; --input:#f3f6fb;
  --line:#e5e9ef; --line2:#d2d9e2; --border:#e5e9ef; --sidebar:#f3f5f8;
  --text:#141b24; --text2:#3a4453; --text3:#5f6b7a; --text4:#8a96a5;
  --pri:#1b2330; --pri-ink:#ffffff; --pri-hi:#0f1620;
  --amber:#b3730a; --blue:#2f63d6; --green:#0e9c62; --red:#dc3a45; --violet:#6b4dd6; --grey:#7a8695;
  --focus:#2f63d6; --ring:rgba(47,99,214,.2);
  --shadow:0 1px 2px rgba(20,30,50,.06), 0 4px 14px rgba(20,30,50,.06);
  --shadow-lg:0 24px 60px rgba(20,30,50,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text2);font-family:var(--sans);font-size:12.5px;line-height:1.46;-webkit-font-smoothing:antialiased;letter-spacing:-.003em;overflow:hidden}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;color:var(--text)}
.mono{font-family:var(--mono);font-feature-settings:"tnum" 1;letter-spacing:-.01em}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px;border:2px solid var(--bg);background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}
::selection{background:color-mix(in srgb,var(--blue) 34%,transparent)}

.ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ic svg{width:100%;height:100%;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;display:block}
.ic.fill svg{fill:currentColor;stroke:none}

.shell{display:flex;height:100vh}

/* ---------- SIDEBAR ---------- */
.sidebar{width:var(--w-side);min-width:var(--w-side);background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:width .16s ease}
.sb-brand{display:flex;align-items:center;gap:9px;padding:13px 12px 11px}
.sb-logo{width:27px;height:27px;border-radius:7px;background:var(--raise);border:1px solid var(--line2);color:var(--text);font-family:var(--mono);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-.02em}
.sb-brand h1{font-size:13px;font-weight:700;letter-spacing:-.01em;color:var(--text);white-space:nowrap;line-height:1.15}
.sb-brand .tag{font-size:9.5px;color:var(--text4);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.sb-toggle{margin-left:auto;width:24px;height:24px;border:1px solid var(--line);border-radius:6px;color:var(--text4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.12s}
.sb-toggle .ic{width:14px;height:14px}
.sb-toggle:hover{color:var(--text2);border-color:var(--line2);background:var(--hover)}
.sb-nav{padding:6px 9px;display:flex;flex-direction:column;gap:2px}
.nav-i{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;color:var(--text2);font-size:13px;font-weight:500;text-align:left;width:100%;position:relative;transition:.1s}
.nav-i .ic{width:18px;height:18px;color:var(--text4);transition:.1s}
.nav-i:hover{background:var(--hover);color:var(--text)}
.nav-i:hover .ic{color:var(--text2)}
.nav-i.on{background:var(--hover);color:var(--text);font-weight:600}
.nav-i.on .ic{color:var(--text)}
.nav-i.on::before{content:'';position:absolute;left:-9px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--pri)}
.nav-i .ct{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:600;background:var(--input);color:var(--text3);border-radius:99px;padding:1px 7px;min-width:20px;text-align:center}
.nav-i.on .ct{background:var(--line2);color:var(--text)}
.nav-i .dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--red)}
.sb-foot{margin-top:auto;padding:9px;border-top:1px solid var(--line)}
.sb-foot button{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px;font-size:12px;font-weight:500;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:7px;transition:.12s}
.sb-foot button .ic{width:14px;height:14px}
.sb-foot button:hover{border-color:var(--line2);color:var(--text);background:var(--hover)}
.sidebar.collapsed{width:56px;min-width:56px}
.sidebar.collapsed .sb-brand h1,.sidebar.collapsed .sb-brand .tag,.sidebar.collapsed .sb-logo,.sidebar.collapsed .nav-i>span:not(.ic):not(.ct):not(.dot),.sidebar.collapsed .sb-foot .lbl{display:none}
.sidebar.collapsed .sb-brand{justify-content:center;padding:13px 0}
.sidebar.collapsed .nav-i{justify-content:center}.sidebar.collapsed .sb-toggle{margin:0}
.sidebar.collapsed .nav-i .ct{position:absolute;top:1px;right:3px;margin:0;min-width:0;padding:0 4px;font-size:9px}

/* ---------- HEADER ---------- */
.content{flex:1;display:flex;flex-direction:column;min-width:0}
.chead{height:var(--h-header);display:flex;align-items:center;gap:14px;padding:13px var(--px) 11px;border-bottom:1px solid var(--line);background:var(--surface);flex-shrink:0}
.chead-l{min-width:0;flex-shrink:0}
.chead-l .ttl{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.25}
.chead-l .sub{font-size:11.5px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chead-l .sub b{font-family:var(--mono);font-weight:600;color:var(--text2)}
.chead-l .sub .risk{color:var(--red)}.chead-l .sub .warn{color:var(--amber)}
.gsearch{margin:0 auto;position:relative;width:min(440px,40%)}
.gsearch .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text4)}
.gsearch input{width:100%;height:var(--ctrl);background:var(--raise);border:1px solid var(--line);border-radius:8px;padding:0 42px 0 34px;font-size:12.5px}
.gsearch input::placeholder{color:var(--text4)}
.gsearch input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring);background:var(--surface)}
.gsearch .kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10.5px;color:var(--text4);background:var(--input);border:1px solid var(--line);border-radius:5px;padding:1px 5px}
.cmd-search{position:relative;display:inline-flex;align-items:center}
.cmd-search .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text4)}
.cmd-search input{width:100%;height:var(--ctrl);background:var(--raise);border:1px solid var(--line);border-radius:8px;padding:0 11px 0 32px;font-size:12px;color:var(--text)}
.cmd-search input::placeholder{color:var(--text4)}
.cmd-search input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.chead-r{margin-left:auto;display:flex;align-items:center;gap:9px;flex-shrink:0}
.sync{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text3);font-weight:500}
.sync .d{width:7px;height:7px;border-radius:50%;background:var(--green)}
.iconbtn{width:var(--ctrl);height:var(--ctrl);border:1px solid var(--line);border-radius:8px;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:.12s}
.iconbtn .ic{width:16px;height:16px}
.iconbtn:hover{color:var(--text);border-color:var(--line2);background:var(--raise)}

/* ---------- BUTTONS ---------- */
.btn{background:var(--raise);border:1px solid var(--line);border-radius:7px;color:var(--text2);height:var(--ctrl);padding:0 12px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:.12s}
.btn .ic{width:14px;height:14px}
.btn:hover{border-color:var(--line2);color:var(--text);background:var(--hover)}
.btn.pri{background:var(--pri);color:var(--pri-ink);border-color:transparent;font-weight:600}
.btn.pri .ic{color:var(--pri-ink)}
.btn.pri:hover{background:var(--pri-hi)}
.btn.sm{height:27px;padding:0 9px;font-size:11.5px;border-radius:6px}
.btn.sm .ic{width:13px;height:13px}
.btn.danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 42%,transparent);background:transparent}
.btn.danger:hover{background:color-mix(in srgb,var(--red) 13%,transparent);border-color:var(--red);color:var(--red)}
.btn.ghost{background:none}

/* ---------- PAGE FRAME ---------- */
.page{flex:1;overflow-y:auto;display:none}
.page.on{display:block}
#page-active.on{display:flex;flex-direction:column;overflow:hidden}
.pad{padding:var(--py) var(--px) 22px;max-width:1460px}
.sec-l{font-size:12.5px;font-weight:700;color:var(--text);letter-spacing:-.01em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-l.sm{font-size:12px}
.sec-l .cnt{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--text4)}
.sec-l .act{margin-left:auto;border:1px solid var(--line);color:var(--text3);font-size:11.5px;font-weight:500;border-radius:6px;padding:3px 9px;display:inline-flex;align-items:center;gap:5px;transition:.12s}
.sec-l .act .ic{width:13px;height:13px}
.sec-l .act:hover{border-color:var(--line2);color:var(--text);background:var(--raise)}
.hint{color:var(--text3);font-size:12px;line-height:1.5}

/* ---------- KPI TILES ---------- */
.tilerow{display:grid;gap:var(--gap2);margin-bottom:var(--gap3)}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:8px 11px;position:relative;transition:.13s}
.tile:hover{border-color:var(--line2)}
.tile .l{font-size:11.5px;font-weight:500;color:var(--text3);display:flex;align-items:center;gap:8px}
.tile .l .ic{width:14px;height:14px;color:var(--text4)}
.tile .v{font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--text);margin-top:3px;line-height:1.05}
.tile .v.r{color:var(--red)}.tile .v.g{color:var(--green)}.tile .v.a{color:var(--amber)}
.tile .s{font-size:11px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile.clickable{cursor:pointer}
.kpis .tile .l{color:var(--text3);gap:7px}
.kpis .tile .l .ic{width:21px;height:21px;border-radius:6px;background:color-mix(in srgb,var(--tc) 15%,transparent);color:var(--tc)}
.kpis .tile .l .ic svg{width:14px;height:14px}
.kpis .tile .v{color:var(--tc)}
.kpis .tile.clickable:hover{border-color:color-mix(in srgb,var(--tc) 55%,var(--line2))}

/* ---------- ACTIVE: command bar ---------- */
#page-active .top{padding:var(--py) var(--px) 0}
.pipe{display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:6px 12px;margin-bottom:8px}
.pipe-lbl{font-size:9.5px;font-weight:700;letter-spacing:.07em;color:var(--text4);text-transform:uppercase}
.pstage{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;cursor:pointer;transition:.12s}
.pstage:hover{background:var(--hover)}
.pstage.on{background:color-mix(in srgb,var(--pc) 16%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--pc) 42%,transparent)}
.ps-name{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.ps-name .d{width:7px;height:7px;border-radius:50%;background:var(--pc)}
.pstage.on .ps-name{color:var(--pc)}
.ps-count{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)}
.ps-money{font-family:var(--mono);font-size:11px;color:var(--text3)}
.pipe-sum{margin-left:auto;font-size:11.5px;color:var(--text3);font-weight:500}
.pipe-sum b{font-family:var(--mono);font-weight:600}
.cmdbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.selwrap{position:relative;display:inline-flex}
.selwrap select{appearance:none;height:var(--ctrl);background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:0 28px 0 11px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:.12s}
.selwrap select:hover{border-color:var(--line2);background:var(--hover)}
.selwrap select:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.selwrap.act select{border-color:var(--line2);color:var(--text);background:var(--hover)}
.selwrap .ic{position:absolute;right:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text4);pointer-events:none}
.morebtn{display:inline-flex;align-items:center;gap:7px;height:var(--ctrl);background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:0 11px;font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;transition:.12s}
.morebtn.act{border-color:var(--line2);color:var(--text);background:var(--hover)}
.morebtn:hover{border-color:var(--line2)}
.morebtn .ic{width:13px;height:13px;color:var(--text4)}
.toggles{display:flex;gap:18px;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin:0 0 8px}
.tgl{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--text3);cursor:pointer;font-weight:500}
.tgl input{position:absolute;opacity:0;width:0;height:0}
.tgl .box{width:15px;height:15px;border:1.5px solid var(--line2);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;transition:.1s}
.tgl .box .ic{width:10px;height:10px;color:var(--pri-ink);opacity:0}
.tgl input:checked+.box{background:var(--pri);border-color:var(--pri)}
.tgl input:checked+.box .ic{opacity:1}
.tgl:hover{color:var(--text)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.chip-f{display:inline-flex;align-items:center;gap:6px;background:var(--hover);border:1px solid var(--line2);color:var(--text2);border-radius:99px;padding:3px 8px 3px 10px;font-size:11.5px;font-weight:500}
.chip-f button{color:var(--text3);display:inline-flex;width:13px;height:13px;opacity:.8}
.chip-f button:hover{opacity:1;color:var(--text)}
.chip-clear{color:var(--text4);font-size:11.5px;font-weight:500;text-decoration:underline;text-underline-offset:2px}
.chip-clear:hover{color:var(--text2)}

/* ---------- ACTIVE: master / detail ---------- */
.deck{display:flex;flex:1;min-height:0;border-top:1px solid var(--line)}
.rail{width:268px;min-width:268px;border-right:1px solid var(--line);background:var(--surface);display:flex;flex-direction:column}
.queue{overflow-y:auto;flex:1;padding:8px 8px 14px}
.q-empty{padding:36px 16px;text-align:center;color:var(--text4);font-size:12.5px;line-height:1.65}
.q-empty .ic{width:30px;height:30px;margin:0 auto 10px;color:var(--text4)}
.item{border:1px solid transparent;border-radius:8px;padding:6px 9px;cursor:pointer;margin-bottom:2px;position:relative;transition:.1s}
.item:hover{background:var(--raise)}
.item.sel{background:var(--raise);border-color:var(--line2)}
.item.sel::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--sc,var(--pri))}
.i-top{display:flex;align-items:center;gap:7px}
.i-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.i-flags{display:inline-flex;gap:3px}
.i-money{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:700;white-space:nowrap}
.i-money.risk{color:var(--red)}.i-money.won{color:var(--green)}.i-money.dead{color:var(--text4)}
.i-sub{font-size:11px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.i-sub .sdot{width:7px;height:7px;border-radius:50%;background:var(--sc);flex-shrink:0}
.i-own{display:inline-flex;align-items:center;gap:4px;color:var(--text3)}
.i-own .av{width:15px;height:15px;border-radius:50%;background:var(--ac,var(--input));color:#fff;font-size:8.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.i-foot{display:flex;align-items:center;gap:8px;margin-top:5px}
.i-next{font-size:11.5px;color:var(--text2);font-weight:500;display:inline-flex;align-items:center;gap:5px;min-width:0}
.i-next .ic{width:12px;height:12px;color:var(--text4);flex-shrink:0}
.i-next.urg{color:var(--amber)}.i-next.urg .ic{color:var(--amber)}
.i-next.jack{color:var(--violet)}.i-next.jack .ic{color:var(--violet)}
.i-days{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;background:var(--input);color:var(--text2);white-space:nowrap;flex-shrink:0}
.i-days.warn{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
.i-days.crit{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.i-days.done{background:color-mix(in srgb,var(--green) 16%,transparent);color:var(--green)}
.fl-u,.fl-j,.fl-i{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:5px}
.fl-u .ic,.fl-j .ic,.fl-i .ic{width:11px;height:11px}
.fl-u{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.fl-j{background:color-mix(in srgb,var(--violet) 18%,transparent);color:var(--violet)}
.fl-i{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}

/* ---------- DETAIL ---------- */
.detail{flex:1;overflow-y:auto;padding:10px 13px 18px;min-width:0}
.m-empty{display:flex;height:100%;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text4);text-align:center}
.m-empty .ic{width:36px;height:36px;color:var(--text4)}
.m-head{display:flex;align-items:flex-start;gap:11px;margin-bottom:8px;flex-wrap:wrap}
.m-id{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:9px;flex-wrap:wrap;letter-spacing:-.02em}
.copy{border:1px solid var(--line);color:var(--text3);border-radius:6px;padding:3px 7px;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;transition:.1s}
.copy .ic{width:12px;height:12px}
.copy:hover{color:var(--text);border-color:var(--line2);background:var(--hover)}
.m-meta{font-size:11.5px;color:var(--text3);margin-top:7px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.dest{font-family:var(--mono);font-size:11px;background:var(--raise);border:1px solid var(--line);border-radius:5px;padding:2px 7px;color:var(--text2)}
.statuspill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:99px;background:color-mix(in srgb,var(--sc) 16%,transparent);color:var(--sc);border:1px solid color-mix(in srgb,var(--sc) 40%,transparent);cursor:pointer;position:relative;transition:.1s}
.statuspill:hover{background:color-mix(in srgb,var(--sc) 22%,transparent)}
.statuspill .d{width:6px;height:6px;border-radius:50%;background:var(--sc)}
.statuspill .ic{width:12px;height:12px}
.m-right{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap}

/* next-action panel */
.next{position:relative;overflow:hidden;background:var(--surface);border:1px solid color-mix(in srgb,var(--nc) 38%,var(--line));border-radius:var(--radius);padding:9px 12px 9px 13px;margin-bottom:var(--gap2);--nc:var(--amber)}
.next::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--nc)}
.next.wait{--nc:var(--blue)}.next.jack{--nc:var(--violet)}.next.done{--nc:var(--text4);border-color:var(--line)}
.next-warn{display:flex;align-items:center;justify-content:flex-start;text-align:left;gap:8px;background:color-mix(in srgb,var(--red) 15%,transparent);border-radius:6px;padding:4px 9px;margin-bottom:7px;font-size:11px;font-weight:600;color:var(--red)}
.next-warn .ic{flex:0 0 auto;color:var(--red);width:14px;height:14px}
.next-warn span:not(.ic){flex:1;min-width:0;text-align:left}
.next-warn button{color:var(--red);display:flex;flex-shrink:0;opacity:.7}
.next-warn button:hover{opacity:1}
.next-l{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--nc)}
.next-l .ic{width:14px;height:14px}
.next-risk{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--red);text-transform:none;letter-spacing:0}
.next.wait .next-risk,.next.done .next-risk{color:var(--text3)}
.next-t{font-size:13px;font-weight:700;color:var(--text);margin-top:2px;letter-spacing:-.02em;line-height:1.2}
.next-s{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4;max-width:640px}
.next-btns{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}

/* workflow + financial strip */
.wfstrip{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:8px 11px;margin-bottom:var(--gap2)}
.stepper{display:flex;align-items:center;margin-bottom:6px}
.step{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.step .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text4);transition:.12s}
.step .dot .ic{width:12px;height:12px}
.step .lab{font-size:12px;font-weight:500;color:var(--text4);white-space:nowrap}
.step .conn{flex:1;height:2px;background:var(--line);margin:0 5px;border-radius:2px;min-width:12px}
.step.done .dot{background:var(--green);border-color:var(--green);color:#08150d}
.step.done .lab{color:var(--text2)}.step.done .conn{background:var(--green)}
.step.cur .dot{border-color:var(--text);color:var(--text);background:var(--hover)}
.step.cur .lab{color:var(--text);font-weight:600}
.stepper.dead{opacity:.5}
.step-note{font-size:11.5px;color:var(--text3);margin:0 0 9px 30px}
.step-note b{color:var(--text2);font-weight:600}
.finbar{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;border-top:1px solid var(--line);padding-top:9px}
.finseg{padding:0 14px 0 0;border-right:1px solid var(--line)}
.finseg:last-child{border-right:none;padding-right:0}
.finseg .l{font-size:11px;font-weight:500;color:var(--text3);display:flex;align-items:center;gap:6px}
.finseg .l::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--fc,var(--text3));flex-shrink:0}
.finseg .v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--fc,var(--text));margin-top:2px;letter-spacing:-.02em}
.finseg .s{font-size:10.5px;color:var(--text3);margin-top:1px}

/* tables / issue lines */
.block{margin-bottom:var(--gap2)}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
th{font-size:10px;font-weight:600;color:var(--text4);text-align:left;padding:7px 12px;background:var(--raise);border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em}
th.r,td.r{text-align:right}th.c,td.c{text-align:center}
td{padding:7px 11px;border-bottom:1px solid var(--line);font-size:11.5px;vertical-align:top;color:var(--text2)}
tr:last-child td{border-bottom:none}
tbody tr{transition:.08s}
tbody tr:hover{background:color-mix(in srgb,var(--hover) 55%,transparent)}
.prod{max-width:340px;line-height:1.35}
.prod .pn{font-size:12px;font-weight:600;color:var(--text)}
.prod .ids{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:10.5px;background:var(--raise);border:1px solid var(--line);border-radius:5px;padding:2px 7px;cursor:pointer;color:var(--text3);display:inline-flex;align-items:center;gap:4px;transition:.1s}
.chip:hover{border-color:var(--line2);color:var(--text)}
.chip .k{color:var(--text4);font-weight:600}
.miss{color:var(--red);font-weight:700;font-family:var(--mono)}
.exc{color:var(--amber);font-weight:700;font-family:var(--mono)}
.claim{font-family:var(--mono);font-weight:600;color:var(--text)}
.cog-in{width:74px;background:var(--raise);border:1px solid var(--line);border-radius:6px;padding:4px 7px;font-family:var(--mono);font-size:11.5px;text-align:right;color:var(--text)}
.cog-in:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.ev-yes{color:var(--green);font-weight:600;font-size:11px;display:inline-flex;align-items:center;gap:4px}
.ev-yes .ic{width:13px;height:13px}
.ev-no{color:var(--text4);font-size:11px}
.line-cb{width:15px;height:15px;accent-color:var(--pri);cursor:pointer;margin-top:1px}
.rowx{color:var(--text4);display:inline-flex;width:24px;height:24px;border-radius:5px;align-items:center;justify-content:center;transition:.1s}
.rowx .ic{width:13px;height:13px}
.rowx:hover{color:var(--red);background:color-mix(in srgb,var(--red) 13%,transparent)}

/* accordions */
.acc{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:var(--gap)}
.acc-h{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;border-radius:var(--radius);transition:.1s}
.acc-h:hover{background:var(--hover)}
.acc-t{font-size:12px;font-weight:700;color:var(--text)}
.acc-t .cnt{font-family:var(--mono);font-size:11.5px;color:var(--text4);font-weight:600}
.acc-r{margin-left:auto;display:flex;align-items:center;gap:9px}
.acc-act{border:1px solid var(--line);background:var(--raise);color:var(--text3);font-size:11px;font-weight:500;border-radius:6px;padding:3px 8px;display:inline-flex;align-items:center;gap:5px;transition:.1s}
.acc-act:hover{border-color:var(--line2);color:var(--text)}
.acc-chev{color:var(--text4);display:flex;transition:transform .16s}
.acc.open .acc-chev{transform:rotate(180deg)}
.acc-b{padding:2px 12px 11px}
.acc-b table{border:none;border-radius:0;background:transparent}
.acc-b th{background:transparent;padding:5px 9px 5px 0}
.acc-b td{padding:7px 9px 7px 0}
.acc-b tbody tr:hover{background:transparent}
.evgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px 20px}
.ev-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);padding:2px 0}
.ev-item .mark{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ev-item .mark .ic{width:12px;height:12px}
.ev-item.on .mark{background:color-mix(in srgb,var(--green) 20%,transparent);color:var(--green)}
.ev-item.off .mark{background:var(--raise);color:var(--text4);border:1px solid var(--line)}
.ev-item.off{color:var(--text4)}
.kv{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;gap:11px}
.kv .k{color:var(--text3)}
.kv a{color:var(--blue);text-decoration:none;font-weight:500;word-break:break-all}
.kv a:hover{text-decoration:underline}
.inline-in{flex:1;background:var(--raise);border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);min-width:0}
.inline-in.mono{font-family:var(--mono);font-size:11.5px}
.inline-in:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.mini-btn{border:1px solid var(--line);background:var(--raise);color:var(--text2);border-radius:6px;padding:5px 10px;font-size:11.5px;font-weight:500;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:.1s}
.mini-btn .ic{width:13px;height:13px}
.mini-btn:hover{border-color:var(--line2);color:var(--text)}
.badge-yes{color:var(--green);font-size:11px;font-weight:600}
.badge-no{color:var(--red);font-size:11px;font-weight:600}
.note-t{width:100%;background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:9px 11px;font-size:12px;line-height:1.5;resize:vertical;min-height:54px;color:var(--text)}
.note-t:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.case-row{border-bottom:1px solid var(--line);padding:7px 0}
.case-row:last-of-type{border-bottom:none}
.case-form{display:grid;grid-template-columns:1fr 1fr 74px auto;gap:6px;margin-top:9px}
.case-form input{background:var(--raise);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:11.5px;font-family:var(--mono);min-width:0;color:var(--text)}
.case-form input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.timeline{position:relative;padding-left:18px}
.timeline::before{content:'';position:absolute;left:4px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-row{position:relative;padding:4px 0 4px 4px;font-size:12px;color:var(--text2)}
.tl-row::before{content:'';position:absolute;left:-17px;top:9px;width:8px;height:8px;border-radius:50%;background:var(--text4);border:2px solid var(--surface)}
.tl-row:first-child::before{background:var(--text2)}
.tl-ts{font-family:var(--mono);font-size:10px;color:var(--text4)}

/* status popover */
.pop{position:absolute;top:calc(100% + 7px);left:0;background:var(--surface);border:1px solid var(--line2);border-radius:10px;padding:11px;z-index:60;box-shadow:var(--shadow-lg);width:288px;cursor:default}
.pop-t{font-size:10px;font-weight:600;color:var(--text4);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.pop-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pop-pill{font-size:11.5px;font-weight:500;padding:6px 9px;border-radius:6px;border:1px solid var(--line);color:var(--pc);background:color-mix(in srgb,var(--pc) 12%,transparent);text-align:left;display:flex;align-items:center;gap:6px;transition:.1s}
.pop-pill:hover{border-color:var(--pc)}
.pop-pill.cur{outline:2px solid var(--pc);outline-offset:-1px}
.pop-pill .pd{width:6px;height:6px;border-radius:50%;background:var(--pc);flex-shrink:0}

/* ---------- ACTION CENTRE ---------- */
.ac-lead{font-size:12px;color:var(--text3);margin-bottom:11px}
.ac-lead b{font-weight:600}
.acfilt-row{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:var(--gap3)}
.acfilt{display:flex;align-items:center;gap:10px;background:color-mix(in srgb,var(--tc) 9%,var(--surface));border:1px solid color-mix(in srgb,var(--tc) 26%,var(--line));border-radius:var(--radius);padding:8px 11px;text-align:left;min-height:44px;transition:.12s;cursor:pointer}
.acfilt:hover{border-color:var(--line2)}
.acfilt.on{border-color:color-mix(in srgb,var(--tc) 60%,var(--line2));background:var(--surface);box-shadow:inset 3px 0 0 var(--tc)}
.acfilt .chip{width:27px;height:27px;border-radius:7px;background:color-mix(in srgb,var(--tc) 17%,transparent);color:var(--tc);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;border:none;padding:0;cursor:inherit}
.acfilt .chip svg{width:15px;height:15px}
.acfilt .n{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);flex-shrink:0}
.acfilt.on .n{color:var(--tc)}
.acfilt .fl{flex:1;font-size:11.5px;color:var(--text2);font-weight:500;line-height:1.2;min-width:0}
.acfilt .am{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--tc);flex-shrink:0}
.ac-cols{display:grid;grid-template-columns:2.1fr 1fr;gap:var(--gap3);align-items:start}
@media(max-width:1080px){.ac-cols{grid-template-columns:1fr}}
.ac-colhead{font-size:12px;font-weight:700;color:var(--text);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.ac-colhead .ic{width:14px;height:14px;color:var(--text3)}
.ac-colhead .cnt{font-family:var(--mono);font-size:11.5px;color:var(--text4)}
.bundle{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 13px 10px 15px;margin-bottom:6px;transition:.12s}
.bundle:hover{border-color:var(--line2)}
.bundle::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 3px 3px 0;background:var(--bc,var(--amber))}
.b-top{display:flex;align-items:center;gap:9px}
.b-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}
.b-act{font-size:12.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.b-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.b-dl{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;background:var(--input);color:var(--text2)}
.b-dl.crit{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.b-dl.warn{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
.b-money{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--red);white-space:nowrap}
.b-meta{font-size:11.5px;color:var(--text3);margin-top:4px;line-height:1.4}
.b-flags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.flag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:99px;background:color-mix(in srgb,var(--fgc,var(--grey)) 16%,transparent);color:var(--fgc,var(--grey))}
.flag .ic{width:11px;height:11px}
.b-btns{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.ac-deadlines{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:4px}
.dl-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;transition:.1s}
.dl-row:hover{background:var(--hover);cursor:pointer}
.dl-when{font-family:var(--mono);font-size:11px;font-weight:600;width:42px;flex-shrink:0}
.dl-when.crit{color:var(--red)}.dl-when.warn{color:var(--amber)}
.dl-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}
.dl-sub{font-size:11px;color:var(--text3);margin-top:1px}
.dl-money{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--red)}
.snoozed-note{font-size:11.5px;color:var(--text4);margin-top:10px;display:flex;align-items:center;gap:7px}
.snoozed-note button{color:var(--text2);font-weight:500;text-decoration:underline;text-underline-offset:2px}

/* ---------- OVERVIEW ---------- */
.brief{background:var(--surface);border:1px solid var(--line2);border-radius:var(--radius);padding:9px 12px;margin-bottom:var(--gap3);position:relative;overflow:hidden}
.brief::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--text3)}
.brief .l{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:6px}
.brief .l .ic{width:14px;height:14px}
.brief ul{list-style:none;margin-top:7px;display:grid;grid-template-columns:1fr 1fr;gap:4px 24px}
.brief li{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px}
.brief li .d{width:4px;height:4px;border-radius:50%;background:var(--text4);flex-shrink:0}
.brief li b{font-family:var(--mono);font-weight:600;color:var(--text)}
.arow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:0 13px;height:var(--row);margin-bottom:5px;cursor:pointer;transition:.1s}
.arow:hover{border-color:var(--line2);background:var(--hover)}
.arow-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);width:114px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arow-mid{flex:1;min-width:0}
.arow-t{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arow-sub{font-size:11px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arow-money{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--red);flex-shrink:0}
.arow-btns{display:flex;gap:5px;flex-shrink:0}
.ov-bottom{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap3);align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px}
.panel .sec-l{margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:11px;margin-bottom:7px;font-size:12px}
.bar-l{width:62px;color:var(--text3);font-weight:500;font-size:11px}
.bar{flex:1;height:8px;border-radius:4px;background:var(--input);overflow:hidden}
.bar i{display:block;height:100%;background:var(--bc);border-radius:4px}
.bar-v{width:78px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--text2);font-weight:600}
.mini-list .row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px}
.mini-list .row:last-child{border-bottom:none}
.mini-list .ic{width:14px;height:14px;color:var(--text4);flex-shrink:0}
.mini-list .row .txt{color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-list .row .txt .id{font-family:var(--mono);font-weight:600;color:var(--text)}
.mini-list .row .ts{margin-left:auto;font-size:10.5px;color:var(--text3);white-space:nowrap}

/* ---------- HISTORY ---------- */
.statstrip,.recap-strip{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:var(--gap3)}
.stat{flex:1;padding:8px 12px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;gap:2px;min-height:44px}
.stat:last-child{border-right:none}
.stat .sv{font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.1}
.stat .sv.r{color:var(--red)}.stat .sv.g{color:var(--green)}
.stat .sl{font-size:11px;color:var(--text3);font-weight:500}
.recap-strip .stat:first-child{box-shadow:inset 3px 0 0 var(--green)}
.recap-strip .stat:first-child .sv{color:var(--green)}
.trend-inline{font-size:11.5px;color:var(--text3);display:inline-flex;align-items:center;gap:6px}
.trend-inline .ic{color:var(--text4);width:13px;height:13px}
.month-group{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.mg-head{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:.1s}
.mg-head:hover{background:var(--hover)}
.mg-title{font-size:13px;font-weight:700;color:var(--text)}
.mg-sub{font-size:11px;color:var(--text3);margin-top:1px}
.mg-stats{margin-left:auto;text-align:right}
.mg-stats .rec{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--green)}
.mg-stats .vs{font-size:11px;color:var(--text3);margin-top:1px}
.mg-body{border-top:1px solid var(--line);padding:5px 9px}
.hrow-c{position:relative;display:flex;align-items:center;gap:13px;padding:8px 11px;border-radius:7px;cursor:pointer;transition:.1s}
.hrow-c::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--hc)}
.hrow-c:hover{background:var(--hover)}
.hrow-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}
.hrow-name{font-size:11px;color:var(--text3);margin-top:1px}
.hrow-fin{margin-left:auto;display:flex;gap:24px;text-align:right}
.hrow-fin .n{font-family:var(--mono);font-size:12px;font-weight:600}
.hrow-fin .nl{font-size:10px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:.03em}
.state-tag{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
.state-win{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
.state-partial{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
.state-lost{background:color-mix(in srgb,var(--red) 16%,transparent);color:var(--red)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(3,5,8,.72);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:44px 16px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line2);border-radius:12px;width:100%;max-width:880px;box-shadow:var(--shadow-lg)}
.mo-head{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line)}
.mo-head h2{font-size:14px;font-weight:700;color:var(--text)}
.mo-steps{display:flex;gap:7px;margin-left:12px}
.mo-step{font-size:11px;font-weight:600;color:var(--text4);display:flex;align-items:center;gap:5px}
.mo-step .n{width:18px;height:18px;border-radius:50%;background:var(--hover);color:var(--text4);font-size:10.5px;display:flex;align-items:center;justify-content:center}
.mo-step.on{color:var(--text)}.mo-step.on .n{background:var(--pri);color:var(--pri-ink)}
.mo-step.done .n{background:color-mix(in srgb,var(--green) 22%,transparent);color:var(--green)}
.mo-x{margin-left:auto;color:var(--text3);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.1s}
.mo-x .ic{width:16px;height:16px}
.mo-x:hover{color:var(--text);background:var(--hover)}
.mo-body{padding:16px}
.src-cards{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.src-card{border:1px solid var(--line);background:var(--raise);border-radius:8px;padding:14px;text-align:left;transition:.12s}
.src-card.on{border-color:var(--line2);background:var(--hover)}
.src-card:hover{border-color:var(--line2)}
.src-card .ic{width:20px;height:20px;color:var(--text2);margin-bottom:9px}
.src-card.on .ic{color:var(--text)}
.src-card .t{font-size:13px;font-weight:600;color:var(--text)}
.src-card .d{font-size:11.5px;color:var(--text3);margin-top:4px;line-height:1.45}
.paste-t{width:100%;height:150px;background:var(--raise);border:1px solid var(--line);border-radius:8px;padding:11px;font-family:var(--mono);font-size:11px;resize:vertical;color:var(--text)}
.paste-t:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.f-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:11px}
.f-field label{font-size:11px;font-weight:500;color:var(--text3);display:block;margin-bottom:4px}
.f-field input{width:100%;background:var(--raise);border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:12px;font-family:var(--mono);color:var(--text)}
.f-field input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.line-grid{display:grid;grid-template-columns:1.7fr 1.3fr 1fr 1fr 60px 64px 24px;gap:6px;align-items:center;margin-bottom:6px}
.line-grid input{background:var(--raise);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:11.5px;font-family:var(--mono);min-width:0;color:var(--text)}
.line-grid input:focus{outline:none;border-color:var(--focus)}
.lg-head{font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.03em}
.prev-note{font-size:12px;color:var(--text2);background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:10px 13px;margin:11px 0;line-height:1.5}
.prev-note b{color:var(--text);font-weight:600}
.prev-ok{color:var(--green);font-weight:600;display:inline-flex;align-items:center;gap:4px}
.prev-warn{color:var(--amber);font-weight:600;display:inline-flex;align-items:center;gap:4px}
.mo-foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;align-items:center}

/* ---------- TOAST + misc ---------- */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface);border:1px solid var(--line2);color:var(--text);border-radius:9px;padding:10px 16px;font-size:12.5px;font-weight:500;z-index:200;opacity:0;transition:.24s;pointer-events:none;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .ic{width:15px;height:15px;color:var(--green)}
.tag{font-size:10px;color:var(--text4)}
@media(max-width:1180px){
  .acfilt-row{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:1040px){
  .rail{width:270px;min-width:270px}
  .two,.ov-bottom,.ac-cols{grid-template-columns:1fr}
  .finbar{grid-template-columns:1fr 1fr}
  .finseg:nth-child(2){border-right:none}
  .gsearch{display:none}
  .brief ul{grid-template-columns:1fr}
  .acfilt-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:720px){
  .finbar{grid-template-columns:1fr}
  .finseg{border-right:none;border-bottom:1px solid var(--line);padding:8px 0}
  .finseg:last-child{border-bottom:none}
  .acfilt-row{grid-template-columns:1fr}
}

/* ===================== v6 additions ===================== */
.pad{max-width:none}
/* sidebar live stat */
.sb-stat{margin:2px 9px 9px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface)}
.sb-stat .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text4);font-weight:700}
.sb-stat .v{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--red);margin-top:2px;letter-spacing:-.02em}
.sb-stat .s{font-size:10.5px;color:var(--text3);margin-top:2px}
.sidebar.collapsed .sb-stat{display:none}
/* Overview v6 redesign */
.ov2{display:flex;flex-direction:column;gap:var(--gap3)}
.ov2-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap2)}
.mtile{background:color-mix(in srgb,var(--tc) 16%,var(--surface));border:1px solid color-mix(in srgb,var(--tc) 46%,var(--line));border-radius:var(--radius);padding:13px 14px 14px;position:relative;overflow:hidden;transition:.13s;text-align:center;cursor:pointer}
.mtile::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:var(--tc)}
.mtile:hover{border-color:color-mix(in srgb,var(--tc) 62%,var(--line2));background:color-mix(in srgb,var(--tc) 16%,var(--surface))}
.mt-l{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--text2)}
.mt-l .ic{width:24px;height:24px;border-radius:7px;background:color-mix(in srgb,var(--tc) 26%,transparent);color:var(--tc)}
.mt-l .ic svg{width:14px;height:14px}
.mt-v{font-family:var(--mono);font-size:27px;font-weight:700;letter-spacing:-.02em;color:var(--tc);margin-top:8px;line-height:1}
.mt-s{font-size:12px;color:var(--text3);margin-top:5px}
.ov2-main{display:grid;grid-template-columns:1.55fr 1fr;gap:var(--gap3);align-items:stretch;min-height:calc(100vh - var(--h-header) - 148px)}
.ov2-primary{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);min-height:0}
.ov2-head{display:flex;align-items:center;gap:9px;padding:11px 13px 8px}
.ov2-head .ic{width:15px;height:15px;color:var(--amber)}
.ov2-title{font-size:13.5px;font-weight:700;color:var(--text)}
.ov2-cnt{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--amber);background:color-mix(in srgb,var(--amber) 16%,transparent);border-radius:99px;padding:1px 8px}
.ov2-risk{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red)}
.ov2-brief{font-size:12px;color:var(--text3);padding:0 13px 9px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ov2-brief b{color:var(--text);font-weight:700;font-family:var(--mono)}
.ov2-brief .dotsep{color:var(--text4);margin:0 1px}
.ov2-tasks{flex:1;overflow-y:auto;padding:5px}
.task{display:flex;align-items:center;gap:11px;position:relative;padding:9px 11px 9px 14px;border-radius:7px;cursor:pointer;transition:.1s}
.task:hover{background:var(--hover)}
.task+.task{border-top:1px solid var(--line)}
.task-bar{position:absolute;left:3px;top:10px;bottom:10px;width:3px;border-radius:2px;background:var(--tc)}
.task-main{flex:1;min-width:0}
.task-t{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-sub{font-size:11.5px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-sub .task-id{font-family:var(--mono);color:var(--text2);font-weight:600}
.task-money{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red);flex-shrink:0}
.task-dl{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;background:var(--input);color:var(--text2);flex-shrink:0}
.task-dl.warn{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
.task-dl.crit{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.task .btn.sm{flex-shrink:0}
.ov2-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:180px;height:100%;color:var(--text4);text-align:center;font-size:12.5px}
.ov2-empty .ic{color:var(--green)}
.ov2-side{display:flex;flex-direction:column;gap:var(--gap3);min-height:0}
.ocard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;min-height:0}
.ocard.grow{flex:1}
.oc-head{font-size:12.5px;font-weight:700;color:var(--text);padding:10px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.oc-cnt{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--text4);background:var(--input);border-radius:99px;padding:1px 7px}
.oc-body{padding:4px;overflow-y:auto}
.oc-body.mini-list{padding:3px 13px}
.recov-hero{padding:10px 13px 7px}
.recov-big{font-family:var(--mono);font-size:23px;font-weight:700;color:var(--green);letter-spacing:-.02em;line-height:1}
.recov-lbl{font-size:11.5px;color:var(--text3);margin-top:3px}
.recov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;padding:0 13px 10px;border-bottom:1px solid var(--line)}
.rs-v{font-family:var(--mono);font-size:13px;font-weight:700}
.rs-l{font-size:10.5px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.recov-bars{padding:10px 13px 11px}
@media(max-width:1040px){.ov2-kpis{grid-template-columns:repeat(2,1fr)}.ov2-main{grid-template-columns:1fr;min-height:0}}

/* ===== v8: collapsed sidebar polish + readability ===== */
.sidebar.collapsed .sb-nav{padding:6px 8px;align-items:center}
.sidebar.collapsed .nav-i{justify-content:center;width:40px;height:40px;padding:0;margin:1px auto;border-radius:10px}
.sidebar.collapsed .nav-i .ic{width:20px;height:20px}
.sidebar.collapsed .nav-i.on::before{display:none}
.sidebar.collapsed .nav-i.on{background:color-mix(in srgb,var(--pri) 13%,var(--hover))}
.sidebar.collapsed .nav-i .ct{position:absolute;top:-3px;right:-3px;margin:0;min-width:15px;height:15px;padding:0 3px;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;border-radius:99px;background:var(--line2);color:var(--text);box-shadow:0 0 0 2px var(--sidebar)}
.sidebar.collapsed .nav-i .dot{position:absolute;top:-1px;right:-1px;margin:0;box-shadow:0 0 0 2px var(--sidebar)}
.sidebar.collapsed .sb-toggle{width:34px;height:34px;border-radius:9px;margin:0 auto}
.sidebar.collapsed .sb-toggle .ic{width:16px;height:16px}
.sidebar.collapsed .sb-brand{padding:12px 0}

/* ===== v9: scannable data + inline forms ===== */
.mini-list .row{gap:9px}
.act-ic{width:20px;height:20px;border-radius:5px;background:color-mix(in srgb,var(--ac) 17%,transparent);color:var(--ac);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.act-ic svg{width:12px;height:12px}
.tl-row::before{background:var(--tc,var(--text4))}
.tl-row:first-child::before{background:var(--tc,var(--text2))}
.tsk-av{width:24px;height:24px;border-radius:50%;background:var(--ac,var(--input));color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mini-ov{position:fixed;inset:0;background:rgba(3,5,8,.62);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:150}
.mini-card{background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:16px;width:300px;box-shadow:var(--shadow-lg)}
.mini-h{font-size:13px;font-weight:700;color:var(--text);margin-bottom:11px}
.mini-date{width:100%;background:var(--raise);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;font-family:var(--mono);color:var(--text);color-scheme:dark}
[data-theme="light"] .mini-date{color-scheme:light}
.mini-date:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.mini-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:13px}
.newline{border-top:1px dashed var(--line2);margin-top:6px;padding:10px 2px 3px}
.newline-h{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.newline-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:8px}
.hkpi{cursor:default}
.hkpi:hover{background:color-mix(in srgb,var(--tc) 11%,var(--surface));border-color:color-mix(in srgb,var(--tc) 32%,var(--line))}

/* ===== v10: Settings page ===== */
.set-wrap{max-width:780px;display:flex;flex-direction:column;gap:var(--gap3)}
.set-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.set-h{font-size:12.5px;font-weight:700;color:var(--text);padding:11px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;letter-spacing:-.01em}
.set-h .ic{width:24px;height:24px;border-radius:6px;background:var(--input);color:var(--text2)}
.set-h .ic svg{width:14px;height:14px}
.set-row{display:flex;align-items:center;gap:18px;padding:12px 15px;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:none}
.set-info{flex:1;min-width:0}
.set-l{font-size:12.5px;font-weight:600;color:var(--text)}
.set-d{font-size:11.5px;color:var(--text3);margin-top:3px;line-height:1.45;max-width:460px}
.set-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.set-in{width:88px;background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:13px;font-family:var(--mono);color:var(--text);text-align:right}
.set-in.wide{width:300px;text-align:left;font-size:12px}
.set-in:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.set-u{font-size:11.5px;color:var(--text3);min-width:26px}
.set-btns{gap:7px}
.set-foot{padding:2px 0 4px}
/* ===== v10: typography refinement ===== */
.prod .pn{font-size:12.5px;font-weight:600;color:var(--text);letter-spacing:-.01em;line-height:1.4}
.prod .ids{margin-top:7px;gap:6px}
.chip{font-family:var(--mono);font-size:11px;background:var(--input);border:1px solid var(--line);border-radius:6px;padding:2px 8px 2px 7px;cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;gap:6px;transition:.1s;letter-spacing:0}
.chip:hover{border-color:var(--line2);color:var(--text);background:var(--raise)}
.chip .k{color:var(--text4);font-weight:700;font-size:8.5px;text-transform:uppercase;letter-spacing:.07em;font-family:var(--sans)}

/* ===== v11: sans money font + more colour ===== */
:root{--num:'Plus Jakarta Sans','SF Pro Text',system-ui,-apple-system,sans-serif;--green:#3ee0a6}
/* money & figures -> clean proportional font, tabular figures (codes stay mono) */
.mono,.finseg .v,.mt-v,.i-money,.arow-money,.task-money,.b-money,.dl-money,.recov-big,.rs-v,.stat .sv,.mg-stats .rec,.hrow-fin .n,.ps-count,.next-risk,.sb-stat .v,.i-days,.task-dl,.b-dl,.dl-when,.acfilt .n,.acfilt .am,.cog-in,.set-in,.pipe-sum b,.chead-l .sub b,.claim,.miss,.exc{font-family:var(--num);font-feature-settings:"tnum" 1;letter-spacing:-.01em}
/* MORE COLOUR: financial strip becomes tinted mini-cards */
.finbar{grid-template-columns:repeat(4,1fr);gap:8px;border-top:none;padding-top:10px}
.finseg{padding:10px 12px;border:1px solid color-mix(in srgb,var(--fc) 42%,var(--line));border-radius:9px;background:color-mix(in srgb,var(--fc) 15%,var(--surface));position:relative;overflow:hidden}
.finseg:last-child{border-right:1px solid color-mix(in srgb,var(--fc) 30%,var(--line))}
.finseg::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:var(--fc)}
.finseg .l{color:var(--text2);font-weight:600}
.finseg .l::before{display:none}
.finseg .v{color:var(--fc);font-size:18px;font-weight:700}
.finseg .s{color:var(--text3)}
@media(max-width:1040px){.finbar{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.finbar{grid-template-columns:1fr}}

/* ===== v12: issue lines at scale (50+ SKUs) + colour ===== */
.lines-sum{display:flex;gap:18px;flex-wrap:wrap;align-items:center;padding:1px 2px 10px;font-size:11.5px;color:var(--text3)}
.lines-sum b{color:var(--text);font-weight:700}
.lines-sum b.miss{color:var(--red)}
.lines-sum b.exc{color:var(--amber)}
.lines-sum .ls-warn{color:var(--amber);display:inline-flex;align-items:center;gap:5px}
.line-search{position:relative;margin-bottom:8px}
.line-search>.ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text4)}
.line-search input{width:100%;background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:7px 11px 7px 32px;font-size:12px;color:var(--text)}
.line-search input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.lines-scroll{max-height:min(46vh,400px);overflow-y:auto;border:1px solid var(--line);border-radius:8px}
.lines-scroll table{border:none;border-radius:0;background:transparent}
.lines-scroll th,.lines-scroll td{padding:8px 11px}
.lines-scroll thead th{position:sticky;top:0;background:var(--raise);z-index:2;border-bottom:1px solid var(--line2)}
.lines-scroll tbody tr:hover{background:color-mix(in srgb,var(--hover) 60%,transparent)}

/* ===== v13: master queue (mini-sidebar) readability + colour ===== */
.item{padding:9px 10px 9px 13px;margin-bottom:3px}
.item::before{content:'';position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--sc,var(--text4));opacity:.5;transition:opacity .1s}
.item:hover::before{opacity:.85}
.item.sel::before{opacity:1}
.item.sel{background:var(--raise);border-color:var(--line2)}
.i-id{font-size:12.5px}
.i-sub{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.45}
.i-st{color:var(--sc);font-weight:600}
.i-sub .i-own{color:var(--text3)}
.i-money{font-size:13px}
.i-next{color:var(--text);font-size:12px}

/* ===== v14: per-SKU expandable claim tracker ===== */
.line-tr .prod{cursor:pointer}
.line-tr .ld-chev{display:inline-flex;color:var(--text4);margin-right:5px;transition:transform .15s;vertical-align:-1px}
.line-tr.exp .ld-chev{transform:rotate(180deg);color:var(--text2)}
.line-tr.exp>td{background:color-mix(in srgb,var(--hover) 40%,transparent)}
.ld-row>td{padding:0!important;border-bottom:1px solid var(--line)}
.ld{background:color-mix(in srgb,var(--lc) 8%,var(--surface));border-left:3px solid var(--lc);padding:11px 14px;display:flex;flex-direction:column;gap:10px}
.ld-top{display:flex;align-items:center;gap:11px;flex-wrap:wrap}

.ld-sku{margin-left:auto;font-size:10.5px;color:var(--text4);font-family:var(--mono)}
.ld-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ld-f{display:flex;flex-direction:column;gap:4px;min-width:0}

.ld-f input{background:var(--raise);border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:12px;color:var(--text);min-width:0;width:100%}
.ld-f input:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 3px var(--ring)}
.ld-v{font-family:var(--num);font-size:14px;font-weight:700;color:var(--text);padding:4px 0}
.ld-log{width:100%;justify-content:center}
.ld-msc{border-top:1px solid color-mix(in srgb,var(--lc) 22%,var(--line));padding-top:9px}
.ld-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text4);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.ld-lbl .cnt{font-family:var(--num);color:var(--text3);font-size:10px}
.msc-att{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--text2);padding:3px 0}
.msc-att b{color:var(--text);font-family:var(--num);min-width:22px}
.ma-dot{width:8px;height:8px;border-radius:50%;background:var(--c);flex-shrink:0}
.ma-meta{color:var(--text3);font-family:var(--num)}
.msc-att .rowx{margin-left:auto;width:22px;height:22px}
.ld-empty{font-size:11.5px;color:var(--text4);padding:2px 0}
.selwrap.sm select{height:26px;font-size:11.5px;padding:0 26px 0 10px;font-weight:600}
.selwrap.sm .ic{right:9px}
.selwrap.xs select{height:22px;font-size:10.5px;padding:0 8px;font-weight:600;text-transform:capitalize}

/* ===== v15: per-SKU next-action + quick actions + status chip ===== */
.ld-next{background:color-mix(in srgb,var(--nc) 12%,var(--surface));border:1px solid color-mix(in srgb,var(--nc) 30%,var(--line));border-left:3px solid var(--nc);border-radius:7px;padding:8px 11px}
.ld-next-t{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--nc)}
.ld-next-t .ic{color:var(--nc);flex-shrink:0}
.ld-next-s{font-size:11.5px;color:var(--text2);margin-top:3px;line-height:1.4}
.ld-acts{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.ld-acts .mini-btn{height:26px}
.ld-done{border-color:color-mix(in srgb,var(--green) 42%,transparent);color:var(--green)}
.ld-done:hover{border-color:var(--green);color:var(--green);background:color-mix(in srgb,var(--green) 11%,transparent)}
.ld-ev2{grid-template-columns:1fr 1fr}
.ln-st{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--c);background:color-mix(in srgb,var(--c) 15%,transparent);border:1px solid color-mix(in srgb,var(--c) 32%,transparent);border-radius:5px;padding:2px 7px;white-space:nowrap;align-self:center}

/* ===== v16: make per-SKU expand obvious ===== */
.line-tr{cursor:pointer}
.line-tr:hover>td{background:color-mix(in srgb,var(--hover) 48%,transparent)}
.line-tr.exp>td{background:color-mix(in srgb,var(--hover) 55%,transparent)}
.line-tr .ld-chev{display:inline-flex;align-items:center;justify-content:center;color:var(--text3);width:20px;height:20px;background:var(--input);border:1px solid var(--line);border-radius:5px;padding:0;margin-right:9px;transition:.12s;vertical-align:middle}
.line-tr:hover .ld-chev{color:var(--text);border-color:var(--line2)}
.line-tr.exp .ld-chev{color:var(--text);background:color-mix(in srgb,var(--blue) 24%,transparent);border-color:transparent}
.ls-tip{margin-left:auto;font-size:11px;color:var(--text4);display:inline-flex;align-items:center;gap:5px;font-style:italic}
.ls-tip .ic{color:var(--text4)}

/* ===== v17: every line shows its claim tracker ===== */
.lines-scroll{max-height:min(64vh,660px)}
.line-tr>td{border-top:2px solid var(--line);background:color-mix(in srgb,var(--hover) 40%,transparent)}
.line-tr:first-child>td{border-top:none}
.ld-row>td{padding-bottom:8px!important}

/* ===== v18: SKU cards (colour = claim stage) ===== */
.sku{border:1px solid color-mix(in srgb,var(--lc) 34%,var(--line));border-radius:9px;overflow:hidden;margin-bottom:9px;background:var(--surface)}
.sku-h{display:flex;align-items:center;gap:12px;padding:11px 13px;cursor:pointer;background:color-mix(in srgb,var(--lc) 9%,var(--surface));border-left:3px solid var(--lc)}
.sku-h:hover{background:color-mix(in srgb,var(--lc) 15%,var(--surface))}
.sku .line-cb{flex-shrink:0}
.sku-main{flex:1;min-width:0}
.sku-t{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;letter-spacing:-.01em}
.sku-ids{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.sku-disc{text-align:center;flex-shrink:0;min-width:44px}
.sku-disc-n{font-family:var(--num);font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1}
.sku-disc-n.miss{color:var(--red)}.sku-disc-n.exc{color:var(--amber)}.sku-disc-n.zero{color:var(--text4)}
.sku-disc-l{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--text4);margin-top:3px}
.sku-st{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--lc);background:color-mix(in srgb,var(--lc) 16%,transparent);border:1px solid color-mix(in srgb,var(--lc) 34%,transparent);border-radius:6px;padding:3px 9px;white-space:nowrap;flex-shrink:0}
.sku .ld-chev{display:inline-flex;align-items:center;justify-content:center;color:var(--text3);width:20px;height:20px;background:var(--input);border:1px solid var(--line);border-radius:5px;flex-shrink:0;transition:.12s;margin:0}
.sku-h:hover .ld-chev{color:var(--text);border-color:var(--line2)}
.sku:not(.col) .ld-chev{transform:rotate(180deg)}
.sku-b{padding:11px 13px 13px;display:flex;flex-direction:column;gap:10px;border-top:1px solid color-mix(in srgb,var(--lc) 18%,var(--line))}
.ld-v.miss{color:var(--red)}.ld-v.exc{color:var(--amber)}
.ld-lbl .ld-log{margin-left:auto;height:22px;padding:0 8px;text-transform:none;letter-spacing:0;font-weight:500}

/* ===== v19: per-SKU checks + tweaks ===== */
.sku-chks{display:flex;gap:8px;flex-wrap:wrap}
.chk{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:500;color:var(--text3);background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:6px 11px;transition:.1s}
.chk::before{content:'';width:14px;height:14px;border:1.5px solid var(--line2);border-radius:4px;flex-shrink:0}
.chk:hover{border-color:var(--line2);color:var(--text2)}
.chk.on{color:var(--green);border-color:color-mix(in srgb,var(--green) 42%,transparent);background:color-mix(in srgb,var(--green) 11%,transparent)}
.chk.on::before{background:var(--green);border-color:var(--green)}

/* v21 — SLA chase nudge */
.next-sla{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:12px;color:var(--text3);font-weight:500}
.next-sla b{color:var(--text);font-family:var(--num);font-weight:700}
.next-sla.over{color:var(--amber)}
.next-sla.over b{color:var(--amber)}

/* v22 — trial mode banner + toggle */
.trial-banner{display:flex;align-items:center;gap:7px;padding:4px 14px;background:color-mix(in srgb,var(--amber) 9%,var(--surface));border-bottom:1px solid color-mix(in srgb,var(--amber) 24%,transparent);color:var(--text3);font-size:11px;font-weight:500;position:sticky;top:0;z-index:30}
.trial-banner .ic{color:var(--amber);flex:none}
.trial-banner b{color:var(--amber);font-weight:700}
.sync.trial{color:var(--amber)}
.sync.trial .d{background:var(--amber)}
.toggle{width:38px;height:22px;border-radius:22px;background:var(--line2);border:1px solid var(--line2);position:relative;cursor:pointer;padding:0;transition:background .15s,border-color .15s;flex:none}
.toggle .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text3);transition:transform .15s,background .15s}
.toggle.on{background:color-mix(in srgb,var(--amber) 78%,transparent);border-color:var(--amber)}
.toggle.on .knob{transform:translateX(16px);background:#fff}

/* v23 — claim window bar, cog-need, header edit, card accent */
.cwbar-wrap{margin-top:11px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.cwbar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3)}
.cwbar-day{font-family:var(--num);font-size:13px;font-weight:800;letter-spacing:-.01em;text-transform:none;color:var(--cwc,var(--green))}
.cwbar{height:9px;border-radius:6px;background:var(--input);overflow:hidden;position:relative;border:1px solid var(--line)}
.cwbar i{display:block;height:100%;border-radius:6px;background:var(--cwc,var(--green));box-shadow:0 0 10px -1px var(--cwc,var(--green));transition:width .3s}
.cwbar-mk{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--text4);font-weight:500}
.cog-need{display:flex;align-items:center;gap:8px;background:color-mix(in srgb,var(--red) 16%,var(--surface));border:1px solid color-mix(in srgb,var(--red) 46%,transparent);border-radius:8px;padding:8px 11px;margin-bottom:9px;font-size:12px;font-weight:600;color:var(--red)}
.cog-need .ic{flex:none;color:var(--red)}
.cog-in.need,input.need{border-color:var(--red)!important;background:color-mix(in srgb,var(--red) 13%,var(--input))!important;color:var(--red)!important;font-weight:700}
.sku.cogwarn{background:color-mix(in srgb,var(--red) 6%,var(--surface))}
.sku{border-left:3px solid var(--lc)}
.hdr-edit{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line2);border-radius:10px;padding:11px 13px;margin:2px 0 11px}
.hdr-edit .f-field{margin:0}
.hdr-edit label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);font-weight:700;margin-bottom:4px}
.hdr-edit input{background:var(--input);border:1px solid var(--line2);border-radius:7px;padding:7px 9px;font-size:13px;color:var(--text)}

/* ============ v24 — design polish pass ============ */
.finseg,.mtile{background:color-mix(in srgb,var(--fc,var(--tc)) 6%,var(--surface));border:1px solid var(--line);border-radius:11px;position:relative;overflow:hidden}
.finseg{padding:12px 13px 11px}
.mtile{padding:15px 15px 16px}
.finseg::before,.mtile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--fc,var(--tc));opacity:.9}
.finseg .v{font-size:20px;color:var(--fc);font-weight:800;margin-top:3px;letter-spacing:-.02em}
.mt-v{font-size:23px;font-weight:800;color:var(--tc);letter-spacing:-.02em}
.finseg .l,.mt-l{color:var(--text3);font-weight:600;font-size:11px;text-transform:none}
.finseg .s,.mt-s{color:var(--text4);font-size:11px;margin-top:2px}
.sku-t{font-size:14.5px;font-weight:700;letter-spacing:-.01em;color:var(--text)}
.ld-f input,.hdr-edit input,#mLines input,.line-grid input,.cog-in,#add-manual input{background:var(--input);border:1px solid var(--line2);border-radius:7px}
.ld-f input:focus,.hdr-edit input:focus,#mLines input:focus,.line-grid input:focus,.cog-in:focus,#add-manual input:focus{border-color:var(--focus);box-shadow:0 0 0 3px var(--ring);outline:none}
.ld-v{font-weight:700}
.ld-more{margin-top:4px;border-top:1px solid var(--line);padding-top:4px}
.ld-more>summary{list-style:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--text3);padding:6px 0;user-select:none}
.ld-more>summary::-webkit-details-marker{display:none}
.ld-more>summary:hover{color:var(--text)}
.ld-more>summary .ic{transition:transform .15s}
.ld-more[open]>summary .ic{transform:rotate(90deg)}
.ld-more>*+*{margin-top:9px}
.cwbar{position:relative}
.cwbar-tick{position:absolute;top:-1px;bottom:-1px;width:2px;background:var(--surface);opacity:.85;z-index:1}
.stepper .dot b{font-family:var(--num);font-size:11px;font-weight:800}
.step.done .dot{background:var(--green);border-color:var(--green);color:#04150e}

/* v25 — remove-line button */
.ld-del-row{margin-top:10px;padding-top:9px;border-top:1px solid var(--line);display:flex;justify-content:flex-end}
.ld-del{color:var(--red)}
.ld-del:hover{background:color-mix(in srgb,var(--red) 13%,transparent);border-color:color-mix(in srgb,var(--red) 40%,transparent)}

/* ============ v26 — paste guidance, grey text, KPI clean, colourful modal ============ */
.finseg .s,.mt-s{color:var(--text3)}
.cwbar-mk{color:var(--text3)}
.hint{color:var(--text3)}
.mt-l .ic{display:none}
.mt-l{gap:0;font-size:11.5px;font-weight:700;letter-spacing:.02em;color:var(--text2)}
.prev-warn-box{display:flex;gap:11px;align-items:flex-start;background:color-mix(in srgb,var(--amber) 12%,var(--surface));border:1px solid color-mix(in srgb,var(--amber) 45%,transparent);border-radius:10px;padding:14px 16px;font-size:12.5px;line-height:1.55;color:var(--text2)}
.prev-warn-box .ic{color:var(--amber);flex:none;margin-top:1px}
.prev-warn-box b{color:var(--text)}
.src-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.src-card{border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:16px;text-align:left;transition:transform .14s,border-color .14s,box-shadow .14s,background .14s;position:relative}
.src-card:nth-child(1){--sc:var(--blue)}
.src-card:nth-child(2){--sc:var(--violet)}
.src-card:hover{border-color:color-mix(in srgb,var(--sc) 55%,var(--line));transform:translateY(-2px)}
.src-card.on{border-color:var(--sc);background:color-mix(in srgb,var(--sc) 10%,var(--surface));box-shadow:0 0 0 3px color-mix(in srgb,var(--sc) 16%,transparent)}
.src-card .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--sc) 18%,transparent);color:var(--sc);margin-bottom:11px}
.src-card .ic svg{width:19px;height:19px}
.src-card .t{font-size:13.5px;font-weight:700;color:var(--text)}
.src-card .d{font-size:11.5px;color:var(--text3);margin-top:5px;line-height:1.5}

/* v27 — editable shipment ID in paste preview */
.prev-idrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:2px}
.prev-id{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);background:var(--input);border:1px solid var(--line2);border-radius:6px;padding:4px 9px;width:175px;letter-spacing:.02em}
.prev-id:focus{border-color:var(--focus);box-shadow:0 0 0 3px var(--ring);outline:none}
.prev-id.need{border-color:var(--red);background:color-mix(in srgb,var(--red) 12%,var(--input))}
.prev-idhint{font-size:11px;color:var(--red);font-weight:600}

/* ============ v29 — paste-confirm redesigned as colour tiles ============ */
.pv-list{display:flex;flex-direction:column;gap:9px;margin:4px 0 2px}
.pv-card{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--pc,var(--line2));border-radius:11px;padding:12px 14px;transition:border-color .12s,background .12s}
.pv-card.miss{--pc:var(--red)}
.pv-card.exc{--pc:var(--amber)}
.pv-card:hover{background:var(--raise)}
.pv-inc{display:flex;align-items:center;flex:none}
.pv-inc input{width:18px;height:18px;accent-color:var(--pc,var(--blue));cursor:pointer}
.pv-body{flex:1;min-width:0}
.pv-name{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:7px}
.pv-chips{display:flex;flex-wrap:wrap;gap:6px}
.pv-chips .chip{display:inline-flex;align-items:center;gap:5px;background:var(--input);border:1px solid var(--line2);border-radius:6px;padding:3px 8px;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--text);letter-spacing:.01em}
.pv-chips .chip .k{font-family:var(--sans);font-size:8.5px;font-weight:800;color:var(--text4);text-transform:uppercase;letter-spacing:.06em}
.pv-right{display:flex;align-items:center;gap:18px;flex:none}
.pv-disc{font-family:var(--num);font-size:20px;font-weight:800;text-align:center;line-height:1;letter-spacing:-.02em}
.pv-disc.miss{color:var(--red)}
.pv-disc.exc{color:var(--amber)}
.pv-disc span{display:block;font-size:8.5px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.pv-fld{text-align:right}
.pv-fld label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:4px;white-space:nowrap}
.pv-fld .cog-in{width:76px;text-align:right;padding:5px 8px}
.pv-fld b{font-family:var(--num);font-size:15px;font-weight:800;color:var(--text)}
@media(max-width:640px){.pv-card{flex-wrap:wrap}.pv-right{gap:12px;width:100%;justify-content:flex-end}}

/* ============ v30 — Settings visual overhaul ============ */
.set-wrap{max-width:1120px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.set-foot{grid-column:1 / -1;text-align:center;padding-top:2px}
@media(max-width:900px){.set-wrap{grid-template-columns:1fr;max-width:680px}}
.set-card{border-radius:12px}
.set-h{padding:12px 16px}
.set-h .ic{width:27px;height:27px;border-radius:8px}
.set-card:nth-child(1) .set-h .ic{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--amber)}
.set-card:nth-child(2) .set-h .ic{background:color-mix(in srgb,var(--blue) 20%,transparent);color:var(--blue)}
.set-card:nth-child(3) .set-h .ic{background:color-mix(in srgb,var(--green) 20%,transparent);color:var(--green)}
.set-card:nth-child(4) .set-h .ic{background:color-mix(in srgb,var(--violet) 20%,transparent);color:var(--violet)}
.set-card:nth-child(5) .set-h .ic{background:color-mix(in srgb,var(--text3) 24%,transparent);color:var(--text2)}
.set-row{gap:14px;padding:13px 16px;align-items:center}
.set-l{font-size:12.5px}
.set-d{max-width:none;margin-top:4px}
.set-row:has(.set-in.wide){flex-direction:column;align-items:stretch;gap:8px}
.set-in{width:80px;background:var(--input)}
.set-in.wide{width:100%}
.set-u{min-width:30px}

/* v33 — cloud card icon colour (6 cards now) */
.set-card:nth-child(5) .set-h .ic{background:color-mix(in srgb,var(--blue) 20%,transparent);color:var(--blue)}
.set-card:nth-child(6) .set-h .ic{background:color-mix(in srgb,var(--text3) 24%,transparent);color:var(--text2)}


/* ============ v37 — brand mark, collapsed sidebar, badges ============ */
.sb-logo{width:29px;height:29px;border-radius:8px;background:var(--pri);border:none;color:var(--pri-ink);font-family:var(--sans);font-size:12.5px;font-weight:800;letter-spacing:-.03em;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.sb-brand h1{font-size:13.5px;font-weight:800;letter-spacing:-.02em}
.sb-brand .tag{letter-spacing:.1em;color:var(--text4)}
/* collapsed: keep the brand mark visible (was hidden -> looked broken) */
.sidebar.collapsed .sb-logo{display:flex}
.sidebar.collapsed .sb-brand{flex-direction:column;gap:9px;padding:13px 0}
.sidebar.collapsed .sb-toggle{margin:0}
/* no noisy 0 badges */
.nav-i .ct.zero,.sidebar.collapsed .nav-i .ct.zero{display:none}
</style>

<div class="shell">
