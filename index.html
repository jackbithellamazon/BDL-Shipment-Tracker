const CLOUD_TABLE='shipment_deck';const CLOUD_SQL='-- ============================================================\n-- Shipment Deck - FBA reconciliation tracker\n-- Safe to run in a SHARED Supabase project: creates and touches\n-- ONLY the "shipment_deck" table. Re-runnable (idempotent).\n-- ============================================================\n\ncreate table if not exists public.shipment_deck (\n  rid        text primary key,\n  sid        text,\n  status     text,\n  updated    timestamptz default now(),\n  data       jsonb not null,\n  created_at timestamptz default now()\n);\n\ncomment on table public.shipment_deck is $$Shipment Deck app - one row per FBA shipment, full record in data jsonb$$;\n\n-- indexes: keep queries fast as the table grows\ncreate index if not exists shipment_deck_sid_idx     on public.shipment_deck (sid);\ncreate index if not exists shipment_deck_status_idx  on public.shipment_deck (status);\ncreate index if not exists shipment_deck_updated_idx on public.shipment_deck (updated desc);\ncreate index if not exists shipment_deck_data_gin    on public.shipment_deck using gin (data);\n\n-- row level security: open to the anon key (no login, by design)\nalter table public.shipment_deck enable row level security;\n\ndrop policy if exists "shipment_deck_anon_all" on public.shipment_deck;\ncreate policy "shipment_deck_anon_all"\n  on public.shipment_deck\n  for all\n  to anon, authenticated\n  using (true)\n  with check (true);\n\ngrant all on public.shipment_deck to anon, authenticated;\n\n-- shared app config (settings + links) so every device matches\ncreate table if not exists public.shipment_deck_config (\n  k text primary key,\n  data jsonb not null,\n  updated timestamptz default now()\n);\nalter table public.shipment_deck_config enable row level security;\ndrop policy if exists "shipment_deck_config_anon_all" on public.shipment_deck_config;\ncreate policy "shipment_deck_config_anon_all"\n  on public.shipment_deck_config\n  for all\n function win(s){const cw=SETTINGS.claimWindowDays||182;const e=new Date(s.closed||now());e.setDate(e.getDate()+cw);const days=Math.ceil((e-new Date())/86400000);const used=Math.min(100,Math.max(0,100-(days/cw*100)));return{e,days,used}}

const fmtDShort=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}):'—';

const esc=t=>String(t??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

const ownerOf=s=>s.escalated?'Jack':(s.owner||'Unassigned');

const ownerColor=n=>n==='Jack'?'var(--violet)':n==='Sarah'?'var(--blue)':'var(--grey)';
const isSnoozed=s=>s.snoozedUntil&&s.snoozedUntil>now();
/* evidence checklist state (derived + one stored flag) */
function evidence(s){return[
  {k:'invoice',l:'Invoice attached',on:!!s.invoice},
  {k:'shot',l:'Seller Central screenshot',on:!!s.scShot},
  {k:'msc',l:'MSC submitted',on:stepIndex(s.status)>=1&&!isHist(s)||['mscpending','mscapproved','mscreupdate','caseopen','reimbpending','reimbursed','partial'].includes(s.status)},
  {k:'case',l:'Case number logged',on:s.cases.length>0},
  {k:'reimb',l:'Reimbursement ID',on:s.cases.some(c=>c.reimb)}
]}
/* suggested follow-up */
function followUp(s){if(s.followUp)return s.followUp;const base=s.statusAt||s.updated||now();if(s.status==='mscpending')return new Date(base+(SETTINGS.mscCheckDays||5)*86400000).toISOString().slice(0,10);if(s.status==='caseopen'||s.status==='reimbpending')return new Date(base+(SETTINGS.caseChaseDays||7)*86400000).toISOString().slice(0,10);return ''}

function saveLinks(q){localStorage.setItem(LS_LINKS,JSON.stringify(LINKS));if(!q)cloudPushCfg()}
function load(){
  try{const l=localStorage.getItem(LS_LINKS);if(l)LINKS=Object.assign(LINKS,JSON.parse(l))}catch(e){}
  try{const g=localStorage.getItem(LS_SETTINGS);if(g)SETTINGS=Object.assign({},SETTINGS_DEFAULT,JSON.parse(g))}catch(e){}
  TRIAL=localStorage.getItem(LS_TRIAL)==='1';
  if(TRIAL){DATA=[];try{localStorage.removeItem(LS_KEY)}catch(e){}return;}
  try{const raw=localStorage.getItem(LS_KEY);if(raw){DATA=JSON.parse(raw);return}}catch(e){}
  DATA=[];save();
}

function go(page){
  S.page=page;
  document.querySelectorAll('.nav-i').forEach(n=>n.classList.toggle('on',n.dataset.page===page));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+page).classList.add('on');
  renderChrome();
  if(page==='overview')renderOverview();
  if(page==='active')renderActive();
  if(page==='actions')renderActions();
  if(page==='history')renderHistory();if(page==='settings')renderSettings();
}
function renderChrome(){
  const open=DATA.filter(s=>!isHist(s));
  const atRisk=open.reduce((a,s)=>a+Math.max(0,pot(s)-rec(s)),0);
  const soon=open.filter(s=>win(s).days<=SETTINGS.deadlineRiskDays).length;
  const titles={overview:'Overview',active:'Active shipments',actions:'Action Centre',history:'History',settings:'Settings'};
  document.getElementById('pageTitle').textContent=titles[S.page];
  let sub='';
  if(S.page==='active'||S.page==='overview')
    sub=open.length+' open · <b class="risk">'+money(atRisk)+'</b> at risk · <b class="warn">'+soon+'</b> deadline'+(soon!==1?'s':'')+' within '+SETTINGS.deadlineRiskDays+' days';
  else if(S.page==='actions'){const b=acBundles();sub=b.length+' shipment'+(b.length!==1?'s':'')+' need attention';}

    return '<div class="pstage'+(S.fStatus!=='all'&&st.sts.includes(S.fStatus)?' on':'')+'" style="--pc:'+st.c+'" onclick="filterStage(\''+st.k+'\')">'

  }).join('');
  const mStart=new Date();mStart.setDate(1);mStart.setHours(0,0,0,0);
  let recMonth=0;DATA.forEach(s=>s.cases.forEach(c=>{if(c.amt&&c.date&&new Date(c.date)>=mStart)recMonth+=c.amt}));
  const writtenOff=DATA.filter(s=>s.status==='expired'||s.status==='writtenoff').reduce((a,s)=>a+pot(s),0);

}

  const sel=(id,val,opts,on)=>'<span class="selwrap'+(on?' act':'')+'"><select onchange="'+id+'(this.value)">'+opts+'</select>'+ic('chevron',14)+'</span>';
  const moreOn=S.tInvoice||S.tJack||S.t30||S.tFuOverdue||S.tUnassigned;
  return '<div class="cmdbar">'
   +sel('setFStatus','',statusOpts,S.fStatus!=='all')

   +sel('setSort','',sortOpts,false)
   +'<button class="morebtn'+(moreOn||S._more?' act':'')+'" onclick="S._more=!S._more;renderActive()"><span>More filters'+(moreOn?' · '+[S.tInvoice,S.tJack,S.t30,S.tFuOverdue,S.tUnassigned].filter(Boolean).length:'')+'</span>'+ic('chevron',14)+'</button>'
   +'</div>'
   +(S._more?'<div class="toggles">'+tgl('tInvoice','Invoice missing')+tgl('tJack','With Jack')+tgl('t30','Claim window under 30 days')+tgl('tFuOverdue','Follow-up overdue')+tgl('tUnassigned','Only unassigned')+'</div>':'')

function activeChips(){
  const chips=[];
  if(S.fStatus!=='all')chips.push(['Status: '+STATUS[S.fStatus].l,"setFStatus('all')"]);
  if(S.fDeadline!=='any')chips.push([{'14':'Within 14 days','30':'Within 30 days','exp':'Expired'}[S.fDeadline],"setFDeadline('any')"]);
  if(S.fOwner!=='any')chips.push(['Owner: '+S.fOwner,"setFOwner('any')"]);
  if(S.fMissing!=='any')chips.push([{invoice:'Invoice missing',case:'No case yet',reimb:'No reimbursement'}[S.fMissing],"setFMissing('any')"]);
  if(S.tInvoice)chips.push(['Invoice missing',"(function(){S.tInvoice=false;renderActive()})()"]);
  if(S.tJack)chips.push(['With Jack',"(function(){S.tJack=false;renderActive()})()"]);

  if(S.tFuOverdue)chips.push(['Follow-up overdue',"(function(){S.tFuOverdue=false;renderActive()})()"]);
  if(S.tUnassigned)chips.push(['Only unassigned',"(function(){S.tUnassigned=false;renderActive()})()"]);
  if(!chips.length)return '';

function renderActive(){document.getElementById('activeTop').innerHTML=pipelineStrip()+commandBar();hydrateIcons(document.getElementById('activeTop'));renderQueue()}
function urgencyKey(s){if(s.status==='reimbursed'||s.status==='partial')return 9999;if(s.status==='expired'||s.status==='writtenoff')return 9000;return win(s).days}
function activeRows(){
  return DATA.filter(s=>{
    if(isHist(s))return false;
    if(S.fStatus!=='all'&&s.status!==S.fStatus)return false;
    const w=win(s);
    if(S.fDeadline==='14'&&!(w.days<=SETTINGS.deadlineRiskDays&&w.days>=0))return false;
    if(S.fDeadline==='30'&&!(w.days<=SETTINGS.deadlineWarnDays&&w.days>=0))return false;
    if(S.fDeadline==='exp'&&w.days>=0)return false;
    if(S.fOwner!=='any'&&ownerOf(s)!==S.fOwner)return false;
    if(S.fMissing==='invoice'&&s.invoice)return false;
    if(S.fMissing==='case'&&s.cases.length)return false;
    if(S.fMissing==='reimb'&&s.cases.some(c=>c.reimb))return false;
    if(S.tInvoice&&s.invoice)return false;
    if(S.tJack&&!s.escalated)return false;
    if(S.t30&&win(s).days>30)return false;
    if(S.tFuOverdue&&!fuOverdue(s))return false;
    if(S.tUnassigned&&ownerOf(s)!=='Unassigned')return false;
    if(S.q){const blob=(s.id+' '+s.name+' '+s.lines.map(l=>l.asin+' '+l.fnsku+' '+(l.sku||'')+' '+l.p).join(' ')).toLowerCase();if(!blob.includes(S.q))return false}
    return true;
  }).sort((a,b)=>{
    if(S.sort==='urgency')return urgencyKey(a)-urgencyKey(b);
    if(S.sort==='risk')return pot(b)-pot(a);
    if(S.sort==='closed')return new Date(b.closed)-new Date(a.closed);
    if(S.sort==='updated')return (b.updated||0)-(a.updated||0);
    return a.id.localeCompare(b.id);
  });
}
function renderQueue(){
  const rows=activeRows();
  if(!rows.find(s=>s.rid===S.sel))S.sel=rows[0]?rows[0].rid:null;
  const q=document.getElementById('queue');

/* ═══════════ ACTION CENTRE (bundled by shipment) ═══════════ */
function fuDate(s){return s.followUp?new Date(s.followUp):null}
function fuOverdue(s){const d=fuDate(s);return d&&d<new Date(new Date().toDateString())}
function fuFuture(s){const d=fuDate(s);return d&&d>new Date()}
function primaryTask(s){
  const w=win(s),days=daysSince(s.statusAt);
  if(s.urgent)return{title:s.urgent,sub:'Flagged urgent — handle before anything else.',ic:'triangle',bucket:'do',sev:0};
  if(w.days<0)return{title:'Window expired — review',sub:'The claim window has passed. Decide whether to write it off.',ic:'triangle',bucket:'do',sev:1};
  if(w.days<=SETTINGS.deadlineRiskDays)return{title:'Push before the window closes',sub:'Claim window closes '+fmtD(w.e)+' — '+w.days+' day'+(w.days!==1?'s':'')+' left.',ic:'alarm',bucket:'do',sev:1};
  if(!s.invoice&&['invoice','mscreupdate'].includes(s.status))return{title:'Sort the invoice',sub:'Needed before MSC can be pushed. Locate it on the Mastersheets or supplier portal.',ic:'file',bucket:'do',sev:1};
  if(s.status==='mscapproved')return{title:'Open the case',sub:'All MSC lines approved — open the Seller Support case and log the number.',ic:'msg',bucket:'do',sev:1};
  if(fuOverdue(s))return{title:SHORTNEXT[s.status],sub:'Follow-up was due '+fmtDShort(s.followUp)+'.',ic:'alarm',bucket:'do',sev:2};
  if(s.status==='mscreupdate')return{title:'Reupdate MSC on Seller Central',sub:'Push through Manage Shipment Claims, then set MSC pending.',ic:'rotate',bucket:'do',sev:2};
  if(s.status==='mscpending'&&days>=SETTINGS.mscCheckDays&&!fuFuture(s))return{title:'Check MSC result',sub:'MSC pending '+days+' days — Amazon has probably decided. Do not open a case until every line is approved.',ic:'rotate',bucket:'do',sev:2};
  if((s.status==='caseopen'||s.status==='reimbpending')&&!rec(s)&&days>=SETTINGS.caseChaseDays&&!fuFuture(s))return{title:'Chase the case',sub:days+' days without a reimbursement — follow up on Seller Support.',ic:'msg',bucket:'do',sev:2};
  if(s.status==='mscpending')return{title:'Waiting on MSC decision',sub:'Submitted '+days+' day'+(days!==1?'s':'')+' ago'+(fuFuture(s)?' · next check '+fmtDShort(s.followUp):'')+'.',ic:'hourglass',bucket:'wait',sev:5};
  if(s.status==='reimbpending'||s.status==='caseopen')return{title:'Awaiting reimbursement',sub:'Case is with Amazon'+(fuFuture(s)?' · follow up '+fmtDShort(s.followUp):'')+'.',ic:'hourglass',bucket:'wait',sev:5};
  return{title:SHORTNEXT[s.status],sub:NEXT[s.status].s,ic:'arrow',bucket:'do',sev:3};
}
function shipFlags(s){
  const w=win(s),f=[];
  if(s.urgent)f.push({l:'Urgent',c:'var(--red)',ic:'triangle'});
  if(w.days<=SETTINGS.deadlineRiskDays&&w.days>=0)f.push({l:'Closing in '+w.days+'d',c:'var(--red)',ic:'alarm'});
  else if(w.days<=SETTINGS.deadlineWarnDays&&w.days>=0)f.push({l:w.days+'d window',c:'var(--amber)',ic:'clock'});
  if(!s.invoice&&stepIndex(s.status)<2)f.push({l:'Invoice missing',c:'var(--amber)',ic:'file'});
  if(s.escalated)f.push({l:'With Jack',c:'var(--violet)',ic:'user'});
  return f;
}
function acBundles(){
  return DATA.filter(s=>!isHist(s)&&!isSnoozed(s)).map(s=>{
    const w=win(s),risky=s.urgent||w.days<=SETTINGS.deadlineRiskDays||fuOverdue(s);
    let pr;
    if(s.escalated){
      pr=risky
        ?{title:'Follow up with Jack',sub:(s.urgent||(w.days<=SETTINGS.deadlineRiskDays?'Claim window closes '+fmtD(w.e)+' — '+w.days+' days left.':'Follow-up overdue.'))+' Escalated — chase Jack for a decision.',ic:'user',bucket:'do',sev:1}
        :{title:'Waiting on Jack',sub:'Escalated — check his comments before the next step.',ic:'user',bucket:'wait',sev:4};
    }else pr=primaryTask(s);
    return{s,primary:pr,flags:shipFlags(s),m:pot(s),bucket:pr.bucket,dl:w.days};
  }).sort((a,b)=>a.primary.sev-b.primary.sev||b.m-a.m);
}

function setAcFilter(k){S.acFilter=S.acFilter===k?'all':k;renderActions()}
function renderActions(){
  const all=acBundles();
  const counts={
    do:all.filter(b=>b.bucket==='do').length,
    today:all.filter(b=>b.dl<=0).length,
    week:all.filter(b=>b.dl<=7&&b.dl>=0).length,

  };
  const f=S.acFilter||'all';
  const pass=b=>f==='all'?true:f==='do'?b.bucket==='do':f==='today'?b.dl<=0:f==='week'?(b.dl<=7&&b.dl>=0):f==='wait'?b.bucket==='wait':f==='jack'?b.s.escalated:true;
  const bundles=all.filter(pass);
  const doNow=bundles.filter(b=>b.bucket==='do');
  const waiting=bundles.filter(b=>b.bucket==='wait');
  const total=bundles.reduce((a,b)=>a+b.m,0);
  const snoozedN=DATA.filter(s=>!isHist(s)&&isSnoozed(s)).length;
  const upcoming=DATA.filter(s=>!isHist(s)).map(s=>({s,w:win(s)})).filter(x=>x.w.days<=SETTINGS.deadlineWarnDays&&x.w.days>=0).sort((a,b)=>a.w.days-b.w.days);
  const el=document.getElementById('actionsBody');
  if(!all.length&&!snoozedN){el.innerHTML='<div class="q-empty" style="padding:70px">'+ic('check2')+'All clear — nothing needs a touch today.</div>';hydrateIcons(el);return}

function settled(){return DATA.filter(isHist)}
function shipState(s){const r=rec(s),p=pot(s);if(s.status==='expired'||s.status==='writtenoff')return 'lost';if(s.status==='partial'||(r>0&&r<p-0.01))return 'partial';return 'win'}
function renderHistory(){
  const worked=settled();
  const wins=worked.filter(s=>rec(s)>0);
  const recovered=worked.reduce((a,s)=>a+rec(s),0);
  const reachedCOG=worked.filter(s=>rec(s)>=pot(s)-0.01&&rec(s)>0).length;
  const writtenOff=worked.filter(s=>shipState(s)==='lost').reduce((a,s)=>a+pot(s),0);
  const winRate=worked.length?Math.round(wins.length/worked.length*100):0;
  const avgRec=worked.length?recovered/worked.length:0;
  const el=document.getElementById('historyBody');
  if(!worked.length){el.innerHTML='<div class="q-empty" style="padding:60px">'+ic('pkg')+'No settled shipments yet.<br>As shipments get reimbursed or written off they land here.</div>';hydrateIcons(el);return}
  /* group by month of paidAt||closed */
  let list=worked.filter(s=>{if(!S.histSearch)return true;const b=(s.id+' '+s.name+' '+s.lines.map(l=>l.asin+l.fnsku+l.p).join(' ')).toLowerCase();return b.includes(S.histSearch)});
  const gained=s=>rec(s)-pot(s);
  list.sort((a,b)=>{if(S.histSort==='gained')return rec(b)-rec(a);if(S.histSort==='vscog')return gained(b)-gained(a);return (b.paidAt||new Date(b.closed).getTime())-(a.paidAt||new Date(a.closed).getTime())});
  const groups={};list.forEach(s=>{const d=new Date(s.paidAt||s.closed);const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');(groups[key]=groups[key]||[]).push(s)});
  const keys=Object.keys(groups).sort().reverse();
  const mNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const groupH=keys.map((key,gi)=>{
    const g=groups[key];const[y,mo]=key.split('-');
    const gRec=g.reduce((a,s)=>a+rec(s),0),gWins=g.filter(s=>rec(s)>0).length,gRate=Math.round(gWins/g.length*100);
    const overall=gRec-g.reduce((a,s)=>a+pot(s),0);
    const rowsH=g.map(s=>{const state=shipState(s),r=rec(s),p=pot(s),gain=r-p;
      const hc=state==='win'?'var(--green)':state==='partial'?'var(--amber)':'var(--red)';
      const tag=state==='win'?'<span class="state-tag state-win">Recovered</span>':state==='partial'?'<span class="state-tag state-partial">Partial</span>':'<span class="state-tag state-lost">Written off</span>';
      const prod=s.lines[0]?s.lines[0].p:'';
      return '<div class="hrow-c" style="--hc:'+hc+'" onclick="S.sel=\''+s.rid+'\';go(\'active\')"><div><div class="hrow-id">'+esc(s.id)+'</div><div class="hrow-name">'+esc(prod)+(s.lines.length>1?' +'+(s.lines.length-1)+' more':'')+'</div></div>'
       +'<div class="hrow-fin"><div><div class="n">'+money(p)+'</div><div class="nl">COG</div></div>'
       +'<div><div class="n" style="color:'+(r?'var(--green)':'var(--text4)')+'">'+money(r)+'</div><div class="nl">Reimbursed</div></div>'
       +'<div><div class="n" style="color:'+(gain>=0?'var(--green)':'var(--red)')+'">'+(gain>=0?'+':'')+money(gain)+'</div><div class="nl">vs COG</div></div></div>'+tag+'</div>';}).join('');
    return '<div class="month-group"><div class="mg-head" onclick="const b=this.parentNode.querySelector(\'.mg-body\');b.style.display=b.style.display===\'none\'?\'block\':\'none\'">'
      +'<div><div class="mg-title">'+mNames[+mo-1]+' '+y+'</div><div class="mg-sub">'+g.length+' settled · '+gRate+'% win rate</div></div>'
      +'<div class="mg-stats"><div class="rec">+'+money(gRec)+' recovered</div><div class="vs" style="color:'+(overall>=0?'var(--green)':'var(--red)')+'">'+(overall>=0?'+':'')+money(overall)+' vs COG</div></div></div>'
      +'<div class="mg-body"'+(gi>1?' style="display:none"':'')+'>'+rowsH+'</div></div>';
  }).join('');
  /* trend gate: need 3+ settled months */
  const trend=keys.length>=3?'':'<span class="trend-inline">'+ic('trend',14)+'Trend available after '+(3-keys.length)+' more settled month'+((3-keys.length)!==1?'s':'')+'.</span>';

  const hk=(icn,lbl,val,sub,tc)=>'<div class="mtile hkpi" style="--tc:'+tc+'"><div class="mt-l">'+ic(icn)+lbl+'</div><div class="mt-v">'+val+'</div><div class="mt-s">'+sub+'</div></div>';
  el.innerHTML=''
   +'<div class="ov2-kpis hkpis" style="grid-template-columns:repeat(5,1fr);margin-bottom:var(--gap3)">'
   +hk('coins','Recovered',money(recovered),worked.length+' settled','var(--green)')
   +hk('target','Win rate',winRate+'%','of settled claims',winRate>=50?'var(--green)':'var(--amber)')
   +hk('receipt','Avg claim',money(avgRec),'per settled','var(--blue)')
   +hk('check2','Full COG',reachedCOG+'/'+worked.length,'paid in full','var(--green)')
   +hk('cx','Written off',money(writtenOff),writtenOff?'lost to expiry':'none lost',writtenOff?'var(--red)':'var(--text3)')
   +'</div>'
   +'<div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center">'
   +'<span class="cmd-search" style="max-width:300px;flex:1">'+ic('search')+'<input placeholder="Search settled shipments…" value="'+esc(S.histSearch)+'" oninput="S.histSearch=this.value.toLowerCase();renderHistory()"></span>'
   +'<span class="selwrap"><select onchange="S.histSort=this.value;renderHistory()"><option value="gained"'+(S.histSort==='gained'?' selected':'')+'>Sort: recovered</option><option value="vscog"'+(S.histSort==='vscog'?' selected':'')+'>Sort: vs COG</option><option value="newest"'+(S.histSort==='newest'?' selected':'')+'>Sort: newest</option></select>'+ic('chevron',14)+'</span>'
   +trend
   +'<button class="btn" onclick="exportCSV()" style="margin-left:auto">'+ic('receipt')+'Export CSV</button></div>'
   +groupH;
  hydrateIcons(el);
}

function cogFromSku(sku){if(!sku)return 0;const parts=sku.split('_');if(parts.length>1&&/^\d+(\.\d+)?$/.test(parts[1])){const v=parseFloat(parts[1]);if(v>0&&v<2000)return v}return 0}
function parseSCDate(str){const m=str.match(/(\d{1,2})\s+([A-Za-z]{3})\s+(\d{2,4})/);if(!m)return '';const yr=m[3].length===2?'20'+m[3]:m[3];const d=new Date(m[1]+' '+m[2]+' '+yr);return isNaN(d)?'':d.toISOString().slice(0,10)}
function parseRecon(raw){const lines=[];raw.split(/[\t\r\n]+/).forEach(seg=>{seg=seg.trim();if(!seg)return;if(/^[\d+\-−.\s]+$/.test(seg))seg.split(/\s+/).forEach(x=>{if(x)lines.push(x)});else lines.push(seg)});const items=[];let cur=null,gotTitle=false,nums=[],disc=null;
 const isMsku=L=>/^[A-Za-z0-9][\w.\-]{4,}$/.test(L)&&L.indexOf(':')<0&&!/^-?\d+$/.test(L)&&/[_\-]/.test(L)&&L.indexOf(' ')<0&&!/^(ASIN|FNSKU|EAN|UPC|SKU|Size|New|Used|Condition)/i.test(L);
 const flush=()=>{if(cur){if(nums.length>=2){const d=nums[0]-nums[1];if(d>0)cur.miss=d;else if(d<0)cur.exc=-d;cur.qtyExp=nums[0];cur.qtyRec=nums[1];}if(!cur.miss&&!cur.exc&&disc!=null){if(disc<0)cur.miss=-disc;else if(disc>0)cur.exc=disc;}if((cur.asin||cur.sku)&&(cur.miss||cur.exc))items.push(cur);}cur=null;gotTitle=false;nums=[];disc=null;};
 for(let i=0;i<lines.length;i++){const L=lines[i];if(!L)continue;
   if(isMsku(L)){flush();cur={p:'',sku:L,asin:'',fnsku:'',miss:0,exc:0};continue}
   if(!cur)continue;
   let m=L.match(/ASIN:\s*([A-Z0-9]{10})/i);if(m){cur.asin=m[1].toUpperCase();continue}
   m=L.match(/FNSKU:\s*([A-Z0-9]{10})/i);if(m){cur.fnsku=m[1].toUpperCase();continue}
   if(/^(Size|EAN|UPC|SKU|Condition)\s*:/i.test(L)||/^(New|Used)\b/i.test(L))continue;
   if(/^[+\-−]\s?\d{1,4}$/.test(L)){disc=parseInt(L.replace('−','-').replace(/\s/g,''));continue}
   if(/^\d{1,4}$/.test(L)){nums.push(parseInt(L));continue}
   if(/case submitted|units located|no action|reimbursed|closed|investigat|pending|denied/i.test(L)){flush();continue}
   if(!gotTitle&&L.indexOf(':')<0&&L.length>4){cur.p=L;gotTitle=true}
 }
 flush();return items;}
function parsePaste(){
  const raw=document.getElementById('pasteBox').value;if(!raw.trim()){toast('Paste something first');return}
  const lines=raw.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length);
  const idM=raw.match(/FBA[0-9A-Z]{9,}/);
  const R={id:idM?idM[0]:'',name:'',dest:'',closed:'',shipped:0,received:0,items:[]};
  const KEY=new Set(['SKU','ASIN','FNSKU','Order Number','Shipped','Received','Missing','Excess','Reconciled','check_circle','cancel','Shipment ID','Shipment Name','Shipment Status','Destination','Last Update','Case','SKU Count','SKU Issue Count','open_in_new','reupdate MSC','Search shipments...','Items per page:']);
  let lastText='',expect=null,item=null,headerDone=false,gotShip=false,gotRec=false;
  for(let i=0;i<lines.length;i++){const L=lines[i];
    if(L==='Shipment Name'){R.name=lines[i+1]||'';continue}
    if(L==='Destination'){R.dest=lines[i+1]||'';continue}
    if(L==='Last Update'){R.closed=parseSCDate(lines[i+1]||'')||R.closed;continue}
    if(L==='Received'&&!gotRec&&/^\d+$/.test(lines[i+1]||'')&&!item){R.received=parseInt(lines[i+1]);gotRec=true;continue}
    if(L==='Shipped'&&!gotShip&&/^\d+$/.test(lines[i+1]||'')&&!item){R.shipped=parseInt(lines[i+1]);gotShip=true;continue}
    if(L.startsWith('Shipment Items')){headerDone=true;continue}
    if(!headerDone&&L==='SKU')headerDone=true;
    if(!headerDone){if(!KEY.has(L)&&!/^\d+$/.test(L))lastText=L;continue}
    if(expect){if(expect==='sku')item.sku=L;else if(expect==='asin')item.asin=L;else if(expect==='fnsku')item.fnsku=L;else if(expect==='missing')item.miss=parseInt(L)||0;else if(expect==='excess')item.exc=parseInt(L)||0;expect=null;continue}
    if(L==='SKU'){if(item)R.items.push(item);item={p:lastText,sku:'',asin:'',fnsku:'',miss:0,exc:0};expect='sku';continue}
    if(L==='ASIN'){expect='asin';continue}
    if(L==='FNSKU'){expect='fnsku';continue}
    if(L==='Missing'){expect='missing';continue}
    if(L==='Excess'){expect='excess';continue}
    if(L==='Reconciled'){expect=null;i++;continue}
    if(!KEY.has(L)&&!/^\d+$/.test(L))lastText=L;
  }
  if(item)R.items.push(item);
  let issues=R.items.filter(it=>it.miss>0||it.exc>0).map(it=>({...it,cog:cogFromSku(it.sku),inc:true}));if(!issues.length&&/ASIN:\s*[A-Z0-9]{10}/i.test(raw)){issues=parseRecon(raw).map(it=>({...it,cog:cogFromSku(it.sku),inc:true}))}
  if(!R.id&&!issues.length){toast('No shipment ID or discrepancy lines found — paste the View contents page, or use Enter manually');return}
  pending={id:R.id,name:R.name,dest:R.dest,closed:R.closed,shipped:R.shipped,received:R.received,items:issues,allCount:R.items.length,summaryPage:/view contents|MSKUs|Ship From|Send to Amazon|Create shipment|Amazon reference ID/i.test(raw)};
  renderPastePrev();
}

   +'<div class="pv-body"><div class="pv-name">'+esc(it.p||'(no title)')+'</div><div class="pv-chips">'

   +'<div class="pv-right">'
     +'<div class="pv-disc '+(it.miss?'miss':'exc')+'">'+(it.miss?'−'+it.miss:'+'+it.exc)+'<span>'+(it.miss?'missing':'excess')+'</span></div>'
     +'<div class="pv-fld"><label>COG \u00a3/unit</label><input class="cog-in'+((it.miss>0&&!it.cog)?' need':'')+'" type="number" step="0.01" value="'+(it.cog||'')+'" placeholder="?" onchange="setPrevCog('+i+',this.value)"></div>'
     +'<div class="pv-fld"><label>Line claim</label><b id="pvcl'+i+'">'+(it.miss?money(it.miss*(it.cog||0)):'\u2014')+'</b></div>'
   +'</div></div>').join('');
  el.innerHTML='<div class="prev-note prev-idrow">Shipment <input id="prevId" class="prev-id'+(p.id?'':' need')+'" value="'+esc(p.id)+'" placeholder="FBA15…">'+(p.id?'':'<span class="prev-idhint">not on this page — type it</span>')+(p.name?' \u00b7 '+esc(p.name):'')+(p.dest?' \u00b7 '+esc(p.dest):'')+(p.shipped?' \u00b7 '+p.received+'/'+p.shipped+' received':'')+'<br>'
   +'<span class="prev-ok">'+ic('check',14)+(p.items.filter(i=>i.cog).length)+' COG'+(p.items.filter(i=>i.cog).length!==1?'s':'')+' read from SKU</span>'+(cogWarn?' &nbsp; <span class="prev-warn">'+ic('triangle',14)+cogWarn+' COG'+(cogWarn!==1?'s':'')+' need checking</span>':'')+'</div>'

function saveAdd(){
  let recNew;
  if(addMode==='paste'&&pending){const items=pending.items.filter(i=>i.inc);if(!items.length){toast('Tick at least one line');return}
    var _pi=document.getElementById('prevId');const pid=((_pi&&_pi.value.trim())||pending.id||'');if(!pid){toast('Enter the shipment ID (FBA…)');if(_pi)_pi.focus();return}
    recNew={id:pid,name:pending.name,dest:pending.dest,closed:pending.closed||new Date().toISOString().slice(0,10),shipped:pending.shipped,received:pending.received,lines:items.map(i=>({p:i.p,sku:i.sku,asin:i.asin,fnsku:i.fnsku,miss:i.miss,exc:i.exc,cog:i.cog||0}))};
  }else{const id=document.getElementById('mId').value.trim();if(!id){toast('Shipment ID needed');return}const lines=manualLines.filter(l=>(l.asin||l.sku)&&(l.miss||l.exc)).map(l=>Object.assign({},l,{cog:l.cog||cogFromSku(l.sku)||0}));if(!lines.length){toast('Add at least one line with a ± discrepancy');return}
    recNew={id,name:'',dest:'',closed:document.getElementById('mClosed').value||new Date().toISOString().slice(0,10),shipped:0,received:0,lines};
  }
  if(DATA.find(s=>s.id===recNew.id)){if(!confirm(recNew.id+' already exists. Add anyway?'))return}
  const s={...recNew,rid:uid(),status:'invoice',statusAt:now(),invoice:'',scShot:false,urgent:'',escalated:false,owner:'Unassigned',followUp:'',jackNote:'',note:'',cases:[],log:[],createdAt:now(),updated:now(),paidAt:null,firstOffer:null,snoozedUntil:null,sample:false};
  log(s,'Shipment issue logged · '+s.lines.length+' line'+(s.lines.length!==1?'s':'')+' · potential '+money(pot(s)));
  DATA.unshift(s);S.sel=s.rid;S.fStatus='all';closeOv('addOv');go('active');toast(s.id+' created');
}

function exportCSV(){
  const rows=[['Shipment ID','Name','Destination','Closed','Status','Owner','ASIN','FNSKU','SKU','Missing','Excess','COG','Line claim','Case no','Reimb ID','Reimb amount']];
  DATA.forEach(s=>{const o=ownerOf(s);if(!s.lines.length){rows.push([s.id,s.name,s.dest,s.closed,STATUS[s.status].l,o,'','','','','','','','','',''])}
    s.lines.forEach(l=>{const c=s.cases[0]||{};rows.push([s.id,s.name,s.dest,s.closed,STATUS[s.status].l,o,l.asin,l.fnsku,l.sku||'',l.miss||0,l.exc||0,l.cog||0,((l.miss||0)*(l.cog||0)).toFixed(2),c.no||'',c.reimb||'',c.amt||''])})});
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='shipment-deck-'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('CSV exported')
}
